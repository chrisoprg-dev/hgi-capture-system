<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HGI AI Capture System v1.1.2</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; }
    body { background: #0A0A0A; color: #E8E0D0; font-family: 'Georgia', 'Times New Roman', serif; }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: #111; }
    ::-webkit-scrollbar-thumb { background: #8B6E2E; border-radius: 3px; }
    @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.4} }
    textarea::placeholder, input::placeholder { color: #555048; }
    select option { background: #191919; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;
const GOLD="#C9A84C",GOLD_D="#8B6E2E",BG="#0A0A0A",BG2="#111111",BG3="#191919",BG4="#222222";
const TEXT="#E8E0D0",TEXT_D="#888070",BORDER="#2A2520",RED="#C0392B",GREEN="#27AE60",BLUE="#2980B9",ORANGE="#E67E22";

const HGI = `Hammerman & Gainer LLC (HGI) — 95 years.
COMPETENCIES: Disaster Recovery, CDBG-DR Administration, TPA/Claims, Housing Assistance, Construction Management, Benefits Administration.
PAST PERFORMANCE:
- Road Home: $12B CDBG-DR, 130,000+ applicants
- Restore Louisiana: CDBG-DR housing recovery
- BP GCCF: 1,000,000+ claims
- PBGC: 34,000,000+ beneficiaries
- TPCIGA: 20+ years Texas insurance guaranty
- Terrebonne Parish post-Ida, Jefferson Parish FEMA PA, City of Baton Rouge, DFC Child Subsidy
GEOGRAPHY: Louisiana, Gulf Coast, Texas, Southeast US`;

const PROMPT_A = (rfp) => `You are an expert capture manager for HGI. Analyze this RFP and produce a structured decomposition.

HEADER BLOCK (fill every field, use "Not Found" if missing):
RFP Title:
Agency:
Buyer Type: (Federal/State/Parish/Municipality/Housing Authority/Insurance/Other)
Service Archetype: (Disaster Recovery/Grants Admin/Program Mgmt/Construction Mgmt/TPA/Claims/Appeals/Other)
Funding Tags: (FEMA PA/CDBG-DR/CDBG-MIT/HMGP/Other/Not Found)
Procurement Type: (RFP/RFQ/RFI/ITB/Task Order/Other)
Period of Performance:
Key Dates:
Page Limits:
Pricing Type: (T&M/Fixed/Hybrid/Not Found)
Key Personnel Required: (Yes/No)
Estimated Value:
Geography:
Completeness Confidence: (High/Medium/Low)

1) SCOPE SNAPSHOT — 5-8 bullet summary
2) DELIVERABLES & REQUIREMENTS — Major outputs, SLAs, reporting
3) EVALUATION CRITERIA — Factor, subfactors, weight, what evaluators want
4) COMPLIANCE & PASS-FAIL — Mandatory certs, submission rules, disqualifiers
5) KEY PERSONNEL — Role, min years, domain, certs, mobilization expectations
6) PRICING REQUIREMENTS — Format, caps, competitive implications
7) RISKS & GOTCHAS — Short turnaround, hidden requirements, red flags

RFP TEXT:
${rfp}`;

const PROMPT_B = (decomp, ctx) => `You are HGI's senior capture executive. Produce a leadership decision brief.

HEADER BLOCK:
Opportunity:
Decision: (GO / CONDITIONAL GO / NO-BID / WATCHLIST)
Pwin (0-100):
OPI Score (0-100): [Revenue Timing 25 + Pwin 20 + Staffing 20 + Pricing 15 + Effort Inverse 10 + Strategic 10]
Priority Tier: (Tier 1 / Tier 2 / Tier 3 / Archive)
Revenue Timing: (Immediate <90d / Near-term 90-180d / Medium 180-365d / Long-term 365d+)
Staffing Status: (Green/Yellow/Red)
Pricing Posture: (Aggressive/Balanced/Premium/Unknown)
Effort Level: (Low/Medium/High)
Executive Action: (Yes/No)
Confidence: (High/Medium/Low)

1) WHAT THIS IS — 5-8 bullets on what they're buying
2) WHY HGI WINS — 6-8 bullets tied to eval criteria + HGI past performance
3) WHY HGI LOSES — 6-8 bullets: incumbent, staffing, compliance, price gaps
4) OPI + PWIN BREAKDOWN
  OPI Sub-scores (total to OPI): Revenue Timing /25, Pwin /20, Staffing /20, Pricing /15, Effort /10, Strategic /10
  Pwin Sub-scores (total to Pwin): Strategic Fit /20, Competitive Position /25, Staffing /20, Execution /20, Pricing /15
5) PRICING STRATEGY — Type required, posture recommendation, margin risks, intel gaps
6) STAFFING FEASIBILITY — Required roles, gaps, recruit vs team recommendation
7) 48-HOUR ACTION PLAN — 8 actions with Owner: TBD
8) DECISION LOGIC — One paragraph. If CONDITIONAL: exact conditions to flip to GO.

DECOMPOSITION: ${decomp}
CONTEXT: ${ctx || "None provided."}`;

const PROMPT_C = (decomp, brief) => `You are HGI's proposal production engine. Generate a submission-ready first-pass proposal.

HEADER BLOCK:
Proposal Title:
Client:
Due Date:
Pricing Type:
Win Themes:
Top 5 Differentiators:
TBD Items:

SECTION 1 — EXECUTIVE SUMMARY
Mission alignment, problem, HGI solution, relevant past performance proof, outcomes, confident close.

SECTION 2 — TECHNICAL APPROACH
Organized by evaluation factors. Phases, workflows, controls, risk mitigation, QA.

SECTION 3 — MANAGEMENT APPROACH
Org structure, governance, reporting, escalation, stakeholder coordination.

SECTION 4 — STAFFING PLAN
Each required role: responsibilities, qualifications, HGI staffing approach. Surge plan included.

SECTION 5 — PAST PERFORMANCE MATRIX
5-7 entries: Project, Client, Scope relevance, Scale, Outcomes, Why it proves delivery.

SECTION 6 — TRANSITION / MOBILIZATION (90 Days)
Day 1 readiness, 30/60/90 milestones, knowledge transfer, risk mitigations.

SECTION 7 — PRICING NARRATIVE
Approach, posture, cost realism, assumptions, [TBD] for actual rates.

SECTION 8 — COMPLIANCE MATRIX
Requirement | Where Addressed | Owner (TBD) | Status (Draft)

SECTION 9 — CLARIFYING QUESTIONS
10-15 questions to improve HGI's position.

SECTION 10 — RED TEAM CRITIQUE (INTERNAL ONLY)
Top 10 weaknesses, what to fix, evidence needed, competitor advantages, revision priorities.

SECTION 11 — VISUAL EXHIBIT DESCRIPTIONS
For each exhibit: Title, Purpose, Data needed, Layout, Caption.
Required: Mobilization Timeline, Process Flow, Org Chart + RACI, KPI Dashboard, Past Performance Tiles.

DECOMPOSITION: ${decomp}
EXECUTIVE BRIEF: ${brief}`;

const store = {
  get(k){try{const v=localStorage.getItem('hgi_'+k);return v?JSON.parse(v):null}catch{return null}},
  set(k,v){try{localStorage.setItem('hgi_'+k,JSON.stringify(v))}catch{}}
};

async function callClaude(prompt, system, useSearch=false){
  const sys = system || `You are an expert government contracting capture manager for HGI.\n\n${HGI}\n\nBe specific and data-driven.`;
  const body={model:"claude-sonnet-4-20250514",max_tokens:800,system:sys,messages:[{role:"user",content:prompt}]};
  if(useSearch) body.tools=[{type:"web_search_20250305",name:"web_search"}];
  const r=await fetch("/api/claude",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
  const d=await r.json();
  if(!d.content) return "API error — check connection.";
  return d.content.filter(b=>b.type==="text").map(b=>b.text).join("")||"No response.";
}

// UI Components
const Badge=({children,color=GOLD})=>(
  <span style={{display:"inline-block",padding:"2px 8px",borderRadius:3,fontSize:10,fontWeight:700,
    letterSpacing:"0.08em",background:color+"22",color,border:`1px solid ${color}44`,textTransform:"uppercase"}}>
    {children}</span>
);
const Card=({children,style})=>(<div style={{background:BG2,border:`1px solid ${BORDER}`,borderRadius:6,padding:16,...style}}>{children}</div>);
const Btn=({children,onClick,variant="primary",disabled,small,style})=>{
  const base={cursor:disabled?"not-allowed":"pointer",border:"none",borderRadius:4,fontFamily:"inherit",
    fontWeight:600,letterSpacing:"0.05em",transition:"all 0.15s",padding:small?"5px 12px":"9px 18px",
    fontSize:small?12:13,opacity:disabled?0.5:1,...style};
  const v={primary:{background:GOLD,color:BG},secondary:{background:BG4,color:TEXT,border:`1px solid ${BORDER}`},
    danger:{background:RED+"22",color:RED,border:`1px solid ${RED}44`},ghost:{background:"transparent",color:GOLD,border:`1px solid ${GOLD}44`}};
  return <button style={{...base,...v[variant]}} onClick={disabled?undefined:onClick}>{children}</button>;
};
const Input=({value,onChange,placeholder,style})=>(
  <input value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder}
    style={{background:BG3,border:`1px solid ${BORDER}`,borderRadius:4,color:TEXT,fontFamily:"inherit",
      fontSize:13,padding:"8px 10px",outline:"none",width:"100%",...style}}/>
);
const Textarea=({value,onChange,placeholder,rows=4,style})=>(
  <textarea value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} rows={rows}
    style={{width:"100%",background:BG3,border:`1px solid ${BORDER}`,borderRadius:4,color:TEXT,
      fontFamily:"inherit",fontSize:13,padding:10,resize:"vertical",outline:"none",lineHeight:1.6,...style}}/>
);
const Sel=({value,onChange,options,style})=>(
  <select value={value} onChange={e=>onChange(e.target.value)}
    style={{background:BG3,border:`1px solid ${BORDER}`,borderRadius:4,color:TEXT,fontFamily:"inherit",
      fontSize:13,padding:"8px 10px",outline:"none",...style}}>
    {options.map(o=><option key={o.value} value={o.value}>{o.label}</option>)}
  </select>
);
const Label=({text})=><label style={{display:"block",fontSize:11,color:TEXT_D,marginBottom:4,letterSpacing:"0.06em"}}>{text}</label>;
const AIOut=({content,loading,label="AI ANALYSIS"})=>{
  if(loading) return <div style={{color:GOLD,fontSize:13,padding:12,background:BG3,borderRadius:4,border:`1px solid ${GOLD}33`}}>
    <span style={{animation:"pulse 1.2s infinite"}}>⟳ Generating {label}...</span></div>;
  if(!content) return null;
  return <div style={{background:BG3,border:`1px solid ${GOLD}33`,borderRadius:4,padding:14,fontSize:13,lineHeight:1.75,color:TEXT,whiteSpace:"pre-wrap"}}>
    <div style={{color:GOLD,fontSize:11,fontWeight:700,letterSpacing:"0.1em",marginBottom:8}}>◆ {label}</div>
    {content}</div>;
};
const OPIBadge=({score})=>{
  if(!score&&score!==0) return null;
  const n=parseInt(score);
  const color=n>=70?GREEN:n>=45?GOLD:RED;
  const tier=n>=70?"Tier 1":n>=45?"Tier 2":n>=25?"Tier 3":"Archive";
  return <div style={{display:"flex",gap:8,alignItems:"center"}}>
    <div style={{background:color+"22",border:`1px solid ${color}44`,borderRadius:4,padding:"4px 10px"}}>
      <span style={{color,fontWeight:800,fontSize:16}}>{n}</span>
      <span style={{color:TEXT_D,fontSize:10,marginLeft:4}}>OPI</span>
    </div>
    <Badge color={color}>{tier}</Badge>
  </div>;
};

// ── FULL WORKFLOW ─────────────────────────────────────────────────────────────
function FullWorkflow(){
  const [title,setTitle]=useState("");
  const [agency,setAgency]=useState("");
  const [rfpUrl,setRfpUrl]=useState("");
  const [incumbent,setIncumbent]=useState("");
  const [intel,setIntel]=useState("");
  const [rfpText,setRfpText]=useState("");
  const [step,setStep]=useState(0);
  const [outA,setOutA]=useState("");
  const [outB,setOutB]=useState("");
  const [outC,setOutC]=useState("");
  const [decision,setDecision]=useState("");
  const [opi,setOpi]=useState(null);
  const [tab,setTab]=useState("decomp");

  const getDecision=(t)=>{const patterns=["GO","CONDITIONAL GO","NO-BID","WATCHLIST"];for(const p of patterns){if(t.includes("Decision") && t.toUpperCase().includes(p)) return p;} return "";};
  const getOPI=(t)=>{const m=t.match(/OPI Score[^:]*:\s*(\d+)/i);return m?parseInt(m[1]):null;};

  const runA=async()=>{
    if(!rfpText.trim()&&!title.trim()) return;
    setStep(1);setOutA("");setOutB("");setOutC("");setDecision("");setOpi(null);
    const rIn=rfpText||`Title: ${title}\nAgency: ${agency}\nContext: ${intel}`;
    const a=await callClaude(PROMPT_A(rIn),`You are an expert capture manager and proposal architect.\n\n${HGI}\n\nExtract solicitation requirements precisely. Mark missing info as "Not Found in Provided Text".`);
    setOutA(a);setStep(15);
  };
  const runB=async()=>{
    setStep(2);
    const ctx=`Title: ${title}\nAgency: ${agency}\nIncumbent: ${incumbent||"Unknown"}\nIntel: ${intel}\nURL: ${rfpUrl}`;
    const b=await callClaude(PROMPT_B(outA,ctx),`You are a senior capture executive for HGI. Be analytical, decisive, specific.\n\n${HGI}`);
    setOutB(b);
    const dec=getDecision(b);const opiVal=getOPI(b);
    setDecision(dec);setOpi(opiVal);setStep(25);
  };
  const runC=async()=>{
    setStep(3);
    const c=await callClaude(PROMPT_C(outA,outB),`You are a proposal production engine for HGI. Write to win. Use [TBD:...] for unknowns. Do not fabricate staff names.\n\n${HGI}`);
    setOutC(c);setStep(4);
    const tracker=store.get("tracker")||[];
    store.set("tracker",[{id:`wf-${Date.now()}`,title:title||"Untitled",agency,
      stage:decision==="GO"?"pursuing":decision==="CONDITIONAL GO"?"qualifying":"identified",
      decision,opiScore:opi,decomposition:outA,execBrief:outB,proposal:c,
      addedDate:new Date().toISOString(),notes:`Full workflow ${new Date().toLocaleDateString()}`},...tracker]);
  };
  const saveNoProposal=()=>{
    setStep(4);
    const tracker=store.get("tracker")||[];
    store.set("tracker",[{id:`wf-${Date.now()}`,title:title||"Untitled",agency,
      stage:decision==="GO"?"pursuing":decision==="CONDITIONAL GO"?"qualifying":"identified",
      decision,opiScore:opi,decomposition:outA,execBrief:outB,proposal:"",
      addedDate:new Date().toISOString(),notes:`Full workflow ${new Date().toLocaleDateString()}`},...tracker]);
  };

  const stepLabels=["RFP Decomposition","Executive Brief + OPI","Proposal Package"];
  const decColor=decision==="GO"?GREEN:decision==="CONDITIONAL GO"?GOLD:decision==="NO-BID"?RED:TEXT_D;

  return <div>
    <div style={{marginBottom:20}}>
      <h2 style={{color:GOLD,margin:0,fontSize:20,fontWeight:800}}>⚡ Run Full Workflow</h2>
      <p style={{color:TEXT_D,margin:"4px 0 0",fontSize:12}}>RFP Decomposition → Executive Brief + OPI → Proposal Package</p>
    </div>
    {step===0&&<div style={{display:"flex",flexDirection:"column",gap:12}}>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
        <div><Label text="OPPORTUNITY TITLE"/><Input value={title} onChange={setTitle} placeholder="e.g. FEMA PA TPA — Jefferson Parish"/></div>
        <div><Label text="AGENCY"/><Input value={agency} onChange={setAgency} placeholder="e.g. Jefferson Parish OEM"/></div>
        <div><Label text="KNOWN INCUMBENT"/><Input value={incumbent} onChange={setIncumbent} placeholder="e.g. ICF / None / Unknown"/></div>
        <div><Label text="RFP URL (optional)"/><Input value={rfpUrl} onChange={setRfpUrl} placeholder="https://..."/></div>
      </div>
      <div><Label text="RELATIONSHIP INTEL / CONTEXT"/><Textarea value={intel} onChange={setIntel} placeholder="Known relationships, budget intel, political context, past HGI work with this agency..." rows={2}/></div>
      <div><Label text="RFP / SOLICITATION TEXT — paste full text or key sections"/><Textarea value={rfpText} onChange={setRfpText} placeholder="Paste RFP text here. More complete = better output. Can paste scope, eval factors, or key requirements..." rows={10}/></div>
      <Btn onClick={runA} disabled={!rfpText.trim()&&!title.trim()} style={{alignSelf:"flex-start"}}>▶ Step 1: RFP Decomposition</Btn>
    </div>}

    {(step===15||step===2||step===25||step===3)&&<Card style={{marginBottom:20,border:`1px solid ${GOLD}44`}}>
      <div style={{color:GOLD,fontWeight:700,fontSize:13,marginBottom:12}}>Workflow Progress</div>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
        <div style={{width:20,height:20,borderRadius:"50%",background:GREEN,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,color:"#000"}}>✓</div>
        <span style={{color:GREEN,fontSize:12}}>Step 1: RFP Decomposition — Complete</span>
      </div>
      {step===15&&<div style={{marginTop:12}}>
        <AIOut content={outA} label="RFP DECOMPOSITION"/>
        <div style={{marginTop:12}}><Btn onClick={runB}>▶ Step 2: Executive Brief + OPI</Btn></div>
      </div>}
      {step===2&&<div style={{marginTop:8,display:"flex",alignItems:"center",gap:8}}>
        <span style={{color:GOLD,fontSize:12,animation:"pulse 1.2s infinite"}}>⟳ Generating Executive Brief...</span>
      </div>}
      {step===25&&<div>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
          <div style={{width:20,height:20,borderRadius:"50%",background:GREEN,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,color:"#000"}}>✓</div>
          <span style={{color:GREEN,fontSize:12}}>Step 2: Executive Brief — Complete</span>
          <span style={{color:decision==="GO"?GREEN:decision==="CONDITIONAL GO"?GOLD:RED,fontWeight:700,marginLeft:8}}>{decision||"(extracting...)"}</span>
        </div>
        <AIOut content={outB} label="EXECUTIVE DECISION BRIEF"/>
        <div style={{marginTop:12,display:"flex",gap:8,flexWrap:"wrap"}}>
          <Btn onClick={runC}>▶ Step 3: Generate Proposal Package</Btn>
          <Btn variant="secondary" onClick={saveNoProposal}>Save Without Proposal</Btn>
        </div>
      </div>}
      {step===3&&<div style={{marginTop:8}}>
        <span style={{color:GOLD,fontSize:12,animation:"pulse 1.2s infinite"}}>⟳ Generating Proposal Package...</span>
      </div>}
    </Card>}

    {step===4&&<div>
      <Card style={{marginBottom:16,border:`1px solid ${decColor}44`,background:decColor+"08"}}>
        <div style={{display:"flex",alignItems:"center",gap:16,flexWrap:"wrap"}}>
          <div>
            <div style={{fontSize:11,color:TEXT_D,letterSpacing:"0.08em",marginBottom:4}}>DECISION</div>
            <div style={{color:decColor,fontWeight:800,fontSize:22}}>{decision||"WATCHLIST"}</div>
          </div>
          {opi!==null&&<OPIBadge score={opi}/>}
          <Badge color={GREEN}>✓ Saved to Pipeline Tracker</Badge>
          <Btn small variant="secondary" style={{marginLeft:"auto"}} onClick={()=>{setStep(0);setRfpText("");setTitle("");setAgency("");}}>New Workflow</Btn>
        </div>
      </Card>
      <div style={{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap"}}>
        {[["decomp","RFP Decomposition"],["brief","Executive Brief"],["proposal","Proposal Package"]].map(([id,label])=>(
          <button key={id} onClick={()=>setTab(id)} style={{padding:"6px 14px",borderRadius:4,fontSize:12,cursor:"pointer",
            fontFamily:"inherit",background:tab===id?GOLD:BG3,color:tab===id?"#000":TEXT_D,
            border:`1px solid ${tab===id?GOLD:BORDER}`,fontWeight:tab===id?700:400}}>{label}</button>
        ))}
      </div>
      {tab==="decomp"&&<AIOut content={outA} label="RFP DECOMPOSITION — Prompt A"/>}
      {tab==="brief"&&<AIOut content={outB} label="EXECUTIVE DECISION BRIEF — Prompt B"/>}
      {tab==="proposal"&&(outC?<AIOut content={outC} label="PROPOSAL PACKAGE — Prompt C"/>:
        <Card style={{textAlign:"center",padding:32,color:TEXT_D}}>
          <div style={{fontSize:32,marginBottom:8}}>◇</div>
          <div>Proposal not generated — decision was {decision||"NO-BID/WATCHLIST"}</div>
        </Card>)}
    </div>}
  </div>;
}

// ── PIPELINE SCANNER ──────────────────────────────────────────────────────────
function PipelineScanner(){
  const [opps,setOpps]=useState([]);
  const [scanning,setScanning]=useState(false);
  const [progress,setProgress]=useState("");
  const [analysis,setAnalysis]=useState({});
  const [analyzing,setAnalyzing]=useState({});
  const [lastScanned,setLastScanned]=useState(null);
  const [error,setError]=useState("");

  useEffect(()=>{const d=store.get("scanner");if(d){setOpps(d.opps||[]);setLastScanned(d.at);};},[]);

  const QUERIES=[
    {label:"FEMA PA Louisiana",q:"FEMA Public Assistance TPA program management RFP Louisiana 2026"},
    {label:"CDBG-DR Gulf Coast",q:"CDBG-DR disaster recovery program manager RFP Louisiana Gulf Coast 2026"},
    {label:"TPA Claims",q:"third party administrator TPA claims management RFP disaster recovery 2026"},
    {label:"Housing Authority",q:"housing authority program administration RFP Louisiana 2026"},
    {label:"SAM.gov Disaster",q:"SAM.gov NAICS 541611 disaster recovery program management Louisiana Texas 2026"},
    {label:"Recompetes",q:"disaster recovery program management recompete RFP Louisiana Texas 2026"},
  ];

  const scan=async()=>{
    setScanning(true);setError("");setOpps([]);
    const results=[];
    for(let i=0;i<QUERIES.length;i++){
      const sq=QUERIES[i];
      setProgress(`Searching: ${sq.label} (${i+1}/${QUERIES.length})...`);
      try{
        const txt=await callClaude(`Find real open government RFPs matching: "${sq.q}". Today: ${new Date().toLocaleDateString()}. Return ONLY a JSON array. Each object: title, agency, value, deadline (YYYY-MM-DD or TBD), url, description (1 sentence). Only real verifiable opportunities. Return [] if none found.`,"Return ONLY valid JSON array, no markdown, no explanation.",true);
        const clean=txt.replace(/```json|```/g,"").trim();
        const s=clean.indexOf("["),e=clean.lastIndexOf("]");
        if(s!==-1&&e!==-1) JSON.parse(clean.slice(s,e+1)).forEach(o=>{o.id=`sc-${Date.now()}-${Math.random().toString(36).slice(2,7)}`;o.cat=sq.label;results.push(o);});
      }catch(ex){}
      await new Promise(r=>setTimeout(r,300));
    }
    const seen=new Set();
    const deduped=results.filter(o=>{const k=(o.title||"").toLowerCase().slice(0,35);if(seen.has(k))return false;seen.add(k);return true;});
    const at=new Date().toISOString();
    setOpps(deduped);setLastScanned(at);
    store.set("scanner",{opps:deduped,at});
    if(!deduped.length) setError("No results returned. Try again or search portals manually.");
    setProgress("");setScanning(false);
  };

  const analyze=async(opp)=>{
    setAnalyzing(a=>({...a,[opp.id]:true}));
    const txt=await callClaude(`Analyze for HGI:\nTitle: ${opp.title}\nAgency: ${opp.agency}\nValue: ${opp.value}\nDue: ${opp.deadline}\n\n1) HGI fit 1-10\n2) Win themes\n3) Key risks\n4) BID/NO-BID\n5) Next action`);
    setAnalysis(a=>({...a,[opp.id]:txt}));setAnalyzing(a=>({...a,[opp.id]:false}));
  };

  const addTracker=(opp)=>{
    const ex=store.get("tracker")||[];
    if(ex.find(o=>o.id===opp.id)){alert("Already in tracker.");return;}
    store.set("tracker",[{...opp,stage:"identified",notes:"",addedDate:new Date().toISOString()},...ex]);
    alert("Added to Pipeline Tracker!");
  };

  return <div>
    <div style={{display:"flex",alignItems:"flex-start",gap:12,marginBottom:20,flexWrap:"wrap"}}>
      <div>
        <h2 style={{color:GOLD,margin:0,fontSize:20,fontWeight:800}}>Live Pipeline Scanner</h2>
        <p style={{color:TEXT_D,margin:"4px 0 0",fontSize:12}}>SAM.gov · LaPAC · Texas SmartBuy · Gulf Coast portals</p>

// ── PIPELINE TRACKER ──────────────────────────────────────────────────────────
const STAGES=[
  {id:"identified",label:"Identified",color:TEXT_D},
  {id:"qualifying",label:"Qualifying",color:BLUE},
  {id:"pursuing",label:"Pursuing",color:GOLD},
  {id:"proposal",label:"Proposal",color:ORANGE},
  {id:"submitted",label:"Submitted",color:"#9B59B6"},
  {id:"won",label:"Won",color:GREEN},
  {id:"lost",label:"Lost",color:RED},
];

function PipelineTracker(){
  const [items,setItems]=useState(()=>store.get("tracker")||[]);
  const [showAdd,setShowAdd]=useState(false);
  const [editItem,setEditItem]=useState(null);
  const [form,setForm]=useState({title:"",agency:"",type:"",value:"",deadline:"",notes:"",stage:"identified",opiScore:""});
  const [aiNotes,setAiNotes]=useState({});
  const [aiLoading,setAiLoading]=useState({});
  const [expanded,setExpanded]=useState({});

  const save=(d)=>{setItems(d);store.set("tracker",d);};
  const setF=(k,v)=>setForm(f=>({...f,[k]:v}));

  const submit=()=>{
    if(!form.title) return;
    const updated=editItem?items.map(i=>i.id===editItem.id?{...i,...form}:i)
      :[{id:`t-${Date.now()}`,...form,addedDate:new Date().toISOString()},...items];
    save(updated);setForm({title:"",agency:"",type:"",value:"",deadline:"",notes:"",stage:"identified",opiScore:""});
    setShowAdd(false);setEditItem(null);
  };

  const getStrategy=async(item)=>{
    setAiLoading(a=>({...a,[item.id]:true}));
    const txt=await callClaude(`Capture strategy for HGI — stage: ${item.stage}:\nTitle: ${item.title}\nAgency: ${item.agency}\nValue: ${item.value}\nDecision: ${item.decision||"N/A"}\nOPI: ${item.opiScore||"N/A"}\n\nProvide: 3 actions this week, key intel to gather, teaming considerations, Pwin estimate.`);
    setAiNotes(a=>({...a,[item.id]:txt}));setAiLoading(a=>({...a,[item.id]:false}));
  };

  return <div>
    <div style={{display:"flex",alignItems:"center",marginBottom:20}}>
      <div>
        <h2 style={{color:GOLD,margin:0,fontSize:20,fontWeight:800}}>Pipeline Tracker</h2>
        <p style={{color:TEXT_D,margin:"4px 0 0",fontSize:12}}>{items.length} opportunities · Workflow artifacts stored here</p>
      </div>
      <Btn style={{marginLeft:"auto"}} onClick={()=>{setShowAdd(!showAdd);setEditItem(null);}}>+ Add</Btn>
    </div>
    {showAdd&&<Card style={{marginBottom:20,border:`1px solid ${GOLD}44`}}>
      <h3 style={{color:GOLD,margin:"0 0 12px",fontSize:14}}>{editItem?"Edit":"New Opportunity"}</h3>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        <Input value={form.title} onChange={v=>setF("title",v)} placeholder="Title*" style={{gridColumn:"1/-1"}}/>
        <Input value={form.agency} onChange={v=>setF("agency",v)} placeholder="Agency"/>
        <Input value={form.type} onChange={v=>setF("type",v)} placeholder="Type (FEMA PA, TPA...)"/>
        <Input value={form.value} onChange={v=>setF("value",v)} placeholder="Est. Value"/>
        <Input value={form.deadline} onChange={v=>setF("deadline",v)} placeholder="Deadline YYYY-MM-DD"/>
        <Input value={form.opiScore} onChange={v=>setF("opiScore",v)} placeholder="OPI Score (0-100)"/>
        <Sel value={form.stage} onChange={v=>setF("stage",v)} options={STAGES.map(s=>({value:s.id,label:s.label}))} style={{gridColumn:"1/-1"}}/>
        <Textarea value={form.notes} onChange={v=>setF("notes",v)} placeholder="Notes..." rows={2} style={{gridColumn:"1/-1"}}/>
      </div>
      <div style={{marginTop:12,display:"flex",gap:8}}>
        <Btn onClick={submit}>{editItem?"Save":"Add"}</Btn>
        <Btn variant="secondary" onClick={()=>{setShowAdd(false);setEditItem(null);}}>Cancel</Btn>
      </div>
    </Card>}
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(240px,1fr))",gap:12}}>
      {STAGES.map(stage=>{
        const si=items.filter(i=>i.stage===stage.id);
        return <div key={stage.id} style={{background:BG2,border:`1px solid ${BORDER}`,borderRadius:6}}>
          <div style={{padding:"10px 14px",borderBottom:`1px solid ${BORDER}`,display:"flex",alignItems:"center",gap:8}}>
            <div style={{width:8,height:8,borderRadius:"50%",background:stage.color}}/>
            <span style={{color:stage.color,fontWeight:700,fontSize:11,letterSpacing:"0.08em"}}>{stage.label.toUpperCase()}</span>
            <span style={{marginLeft:"auto",background:BG4,color:TEXT_D,borderRadius:10,padding:"1px 7px",fontSize:11}}>{si.length}</span>
          </div>
          <div style={{padding:10,display:"flex",flexDirection:"column",gap:8}}>
            {si.map(item=><div key={item.id} style={{background:BG3,borderRadius:4,padding:10,border:`1px solid ${BORDER}`}}>
              <div style={{fontWeight:600,fontSize:12,color:TEXT,marginBottom:4}}>{item.title}</div>
              {item.agency&&<div style={{fontSize:11,color:TEXT_D,marginBottom:4}}>{item.agency}</div>}
              <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:8,alignItems:"center"}}>
                {item.value&&<span style={{color:GREEN,fontSize:11}}>{item.value}</span>}
                {item.opiScore&&<OPIBadge score={item.opiScore}/>}
                {item.decision&&<Badge color={item.decision==="GO"?GREEN:item.decision==="CONDITIONAL GO"?GOLD:RED}>{item.decision}</Badge>}
              </div>
              <Sel value={item.stage} onChange={v=>save(items.map(i=>i.id===item.id?{...i,stage:v}:i))}
                options={STAGES.map(s=>({value:s.id,label:s.label}))} style={{width:"100%",fontSize:11,marginBottom:6}}/>
              <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                <Btn small onClick={()=>getStrategy(item)} disabled={aiLoading[item.id]}>Strategy</Btn>
                {(item.decomposition||item.execBrief||item.proposal)&&
                  <Btn small variant="ghost" onClick={()=>setExpanded(e=>({...e,[item.id]:!e[item.id]}))}>Artifacts</Btn>}
                <Btn small variant="secondary" onClick={()=>{setForm({title:item.title,agency:item.agency||"",type:item.type||"",value:item.value||"",deadline:item.deadline||"",notes:item.notes||"",stage:item.stage,opiScore:item.opiScore||""});setEditItem(item);setShowAdd(true);}}>Edit</Btn>
                <Btn small variant="danger" onClick={()=>save(items.filter(i=>i.id!==item.id))}>✕</Btn>
              </div>
              {expanded[item.id]&&<div style={{marginTop:8,fontSize:11}}>
                {item.decomposition&&<div style={{color:GOLD,marginBottom:2}}>✓ Decomposition stored</div>}
                {item.execBrief&&<div style={{color:GOLD,marginBottom:2}}>✓ Executive Brief stored</div>}
                {item.proposal&&<div style={{color:GREEN,marginBottom:2}}>✓ Proposal Package stored</div>}
              </div>}
              {(aiLoading[item.id]||aiNotes[item.id])&&<div style={{marginTop:8}}><AIOut content={aiNotes[item.id]} loading={aiLoading[item.id]}/></div>}
            </div>)}
          </div>
        </div>;
      })}
    </div>
  </div>;
}

// ── WINNABILITY SCORING ───────────────────────────────────────────────────────
function WinnabilityScoring(){
  const [f,setF]=useState({title:"",agency:"",value:"",type:"",hgiPP:5,budget:5,timeline:5,incumbent:"",competitors:"",teaming:"",revenueTimeline:"near",context:""});
  const [score,setScore]=useState("");
  const [loading,setLoading]=useState(false);
  const upd=(k,v)=>setF(p=>({...p,[k]:v}));

  const compute=async()=>{
    setLoading(true);
    const txt=await callClaude(`Score HGI winnability AND OPI:\nOpportunity: ${f.title}\nAgency: ${f.agency}\nType: ${f.type}\nValue: ${f.value}\nRevenue Timeline: ${f.revenueTimeline}\nHGI PP Match (1-10): ${f.hgiPP}\nIncumbent: ${f.incumbent||"Unknown"}\nTeaming: ${f.teaming||"Unknown"}\nBudget certainty (1-10): ${f.budget}\nCompetitors: ${f.competitors||"Unknown"}\nContext: ${f.context}\n\nProvide:\n1. Pwin X/100 with sub-scores: Strategic Fit/20, Competitive Position/25, Staffing/20, Execution/20, Pricing/15\n2. OPI X/100 with sub-scores: Revenue Timing/25, Pwin/20, Staffing/20, Pricing/15, Effort/10, Strategic/10\n3. Priority Tier (Tier 1/2/3/Archive)\n4. Recommendation (Strong Pursue/Conditional/Shape Only/Watchlist/No-Bid)\n5. Top 3 actions to increase win probability`);
    setScore(txt);setLoading(false);
  };

  const SliderRow=({k,label})=><div style={{marginBottom:10}}>
    <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
      <Label text={label}/>
      <span style={{color:GOLD,fontSize:12,fontWeight:700}}>{f[k]}/10</span>
    </div>
    <input type="range" min="1" max="10" value={f[k]} onChange={e=>upd(k,parseInt(e.target.value))}
      style={{width:"100%",accentColor:GOLD}}/>
  </div>;

  return <div>
    <h2 style={{color:GOLD,margin:"0 0 20px",fontSize:20,fontWeight:800}}>Winnability Scoring</h2>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20}}>
      <Card>
        <h3 style={{color:GOLD,margin:"0 0 14px",fontSize:14}}>OPPORTUNITY DETAILS</h3>
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          <div><Label text="TITLE"/><Input value={f.title} onChange={v=>upd("title",v)} placeholder="Opportunity name"/></div>
          <div><Label text="AGENCY"/><Input value={f.agency} onChange={v=>upd("agency",v)} placeholder="Agency/client"/></div>
          <div><Label text="EST. VALUE"/><Input value={f.value} onChange={v=>upd("value",v)} placeholder="$50M"/></div>
          <div><Label text="TYPE"/><Input value={f.type} onChange={v=>upd("type",v)} placeholder="FEMA PA, TPA, CDBG-DR..."/></div>
          <div><Label text="KNOWN INCUMBENT"/><Input value={f.incumbent} onChange={v=>upd("incumbent",v)} placeholder="ICF / None / Unknown"/></div>
          <div><Label text="COMPETITORS"/><Input value={f.competitors} onChange={v=>upd("competitors",v)} placeholder="Witt, Hagerty, Dewberry..."/></div>
          <div><Label text="TEAMING NEEDED"/><Input value={f.teaming} onChange={v=>upd("teaming",v)} placeholder="Yes — need construction sub / No"/></div>
          <div><Label text="REVENUE TIMELINE"/>
            <Sel value={f.revenueTimeline} onChange={v=>upd("revenueTimeline",v)} options={[
              {value:"immediate",label:"Immediate (<90 days)"},
              {value:"near",label:"Near-term (90–180 days)"},
              {value:"medium",label:"Medium (180–365 days)"},
              {value:"long",label:"Long-term (365+ days)"}
            ]} style={{width:"100%"}}/>
          </div>
        </div>
      </Card>
      <Card>
        <h3 style={{color:GOLD,margin:"0 0 14px",fontSize:14}}>SCORING FACTORS</h3>
        <SliderRow k="hgiPP" label="HGI PAST PERFORMANCE MATCH"/>
        <SliderRow k="budget" label="BUDGET CERTAINTY"/>
        <SliderRow k="timeline" label="TIMELINE FEASIBILITY"/>
        <div style={{marginTop:10}}><Label text="ADDITIONAL CONTEXT"/>
          <Textarea value={f.context} onChange={v=>upd("context",v)} placeholder="Agency relationships, political context, competing priorities..." rows={4}/>
        </div>
        <Btn onClick={compute} disabled={loading||!f.title} style={{marginTop:12,width:"100%"}}>
          {loading?"⟳ Calculating...":"Calculate Pwin + OPI"}
        </Btn>
      </Card>
    </div>
    {(loading||score)&&<div style={{marginTop:20}}><AIOut content={score} loading={loading} label="PWIN + OPI ANALYSIS"/></div>}
  </div>;
}

// ── RESEARCH & ANALYSIS ───────────────────────────────────────────────────────
function ResearchAnalysis(){
  const [agencyName,setAgencyName]=useState("");
  const [oppType,setOppType]=useState("");
  const [competitors,setCompetitors]=useState("");
  const [context,setContext]=useState("");
  const [result,setResult]=useState("");

  const generate=async()=>{
    setLoading(true);
    const txt=await callClaude(`Deep research for HGI capture:\nAgency: ${agencyName}\nOpportunity Type: ${oppType}\nKnown Competitors: ${competitors}\nContext: ${context}\n\nProvide:\n1. Agency Profile — mission, budget, decision makers, procurement history\n2. Funding Landscape — active FEMA/HUD/state allocations relevant to HGI\n3. Competitive Intel — known players, their strengths/weaknesses vs HGI\n4. Relationship Map — who matters, who HGI should know\n5. Win Strategy — 5 specific recommendations for HGI\n6. Red Flags — reasons to be cautious\n7. Intel Gaps — what we still need to find out`);

        <div><Label text="KNOWN COMPETITORS"/><Input value={competitors} onChange={setCompetitors} placeholder="e.g. ICF, Witt O'Brien's, Hagerty"/></div>
        <div><Label text="CONTEXT"/><Input value={context} onChange={setContext} placeholder="Disaster event, funding round, RFP timeline..."/></div>

    <AIOut content={result} loading={loading} label="RESEARCH & COMPETITIVE INTELLIGENCE"/>
  </div>;
}

// ── RECRUITING & BENCH ────────────────────────────────────────────────────────
function RecruitingBench(){
  const [bench,setBench]=useState(()=>store.get("bench")||[]);
  const [showAdd,setShowAdd]=useState(false);
  const [form,setForm]=useState({name:"",role:"",domain:"",clearance:"",location:"",availability:"",notes:""});
  const [gapText,setGapText]=useState("");
  const [gapResult,setGapResult]=useState("");
  const [gapLoading,setGapLoading]=useState(false);
  const setF=(k,v)=>setForm(f=>({...f,[k]:v}));

  const save=(d)=>{setBench(d);store.set("bench",d);};

  const addPerson=()=>{
    if(!form.name) return;
    save([{id:`b-${Date.now()}`,...form,addedDate:new Date().toISOString()},...bench]);
    setForm({name:"",role:"",domain:"",clearance:"",location:"",availability:"",notes:""});
    setShowAdd(false);
  };

  const analyzeGaps=async()=>{
    setGapLoading(true);
    const benchSummary=bench.map(p=>`${p.name} — ${p.role} — ${p.domain}`).join("\n")||"No bench entries yet";
    const txt=await callClaude(`Staffing gap analysis for HGI:\nRFP Requirements: ${gapText}\nCurrent Bench:\n${benchSummary}\n\nProvide:\n1. Required roles from this RFP\n2. Bench members who qualify for each role\n3. Gaps — roles not covered\n4. Specific recruiting profile for each gap\n5. Teaming partners to consider for gaps\n6. Mobilization timeline risk assessment`);
    setGapResult(txt);setGapLoading(false);
  };

  return <div>
    <div style={{display:"flex",alignItems:"center",marginBottom:20}}>
      <div>
        <h2 style={{color:GOLD,margin:0,fontSize:20,fontWeight:800}}>Recruiting & Bench</h2>
        <p style={{color:TEXT_D,margin:"4px 0 0",fontSize:12}}>{bench.length} bench members tracked</p>
      </div>
      <Btn style={{marginLeft:"auto"}} onClick={()=>setShowAdd(!showAdd)}>+ Add Person</Btn>
    </div>
    {showAdd&&<Card style={{marginBottom:20,border:`1px solid ${GOLD}44`}}>
      <h3 style={{color:GOLD,margin:"0 0 12px",fontSize:14}}>Add Bench Member</h3>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        <Input value={form.name} onChange={v=>setF("name",v)} placeholder="Full Name*"/>
        <Input value={form.role} onChange={v=>setF("role",v)} placeholder="Role (Program Manager, PM...)"/>
        <Input value={form.domain} onChange={v=>setF("domain",v)} placeholder="Domain (FEMA PA, CDBG-DR...)"/>
        <Input value={form.clearance} onChange={v=>setF("clearance",v)} placeholder="Clearance / Certs"/>
        <Input value={form.location} onChange={v=>setF("location",v)} placeholder="Location"/>
        <Input value={form.availability} onChange={v=>setF("availability",v)} placeholder="Availability"/>
        <Textarea value={form.notes} onChange={v=>setF("notes",v)} placeholder="Notes..." rows={2} style={{gridColumn:"1/-1"}}/>
      </div>
      <div style={{marginTop:12,display:"flex",gap:8}}>
        <Btn onClick={addPerson}>Add</Btn>
        <Btn variant="secondary" onClick={()=>setShowAdd(false)}>Cancel</Btn>
      </div>
    </Card>}
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(240px,1fr))",gap:12,marginBottom:24}}>
      {bench.map(p=><Card key={p.id}>
        <div style={{fontWeight:700,color:TEXT,marginBottom:4}}>{p.name}</div>
        <div style={{color:GOLD,fontSize:12,marginBottom:6}}>{p.role}</div>
        {p.domain&&<div style={{fontSize:12,color:TEXT_D,marginBottom:2}}>Domain: {p.domain}</div>}
        {p.location&&<div style={{fontSize:12,color:TEXT_D,marginBottom:2}}>Location: {p.location}</div>}
        {p.availability&&<div style={{fontSize:12,color:TEXT_D,marginBottom:2}}>Available: {p.availability}</div>}
        {p.notes&&<div style={{fontSize:11,color:TEXT_D,marginTop:6,fontStyle:"italic"}}>{p.notes}</div>}
        <Btn small variant="danger" style={{marginTop:10}} onClick={()=>save(bench.filter(b=>b.id!==p.id))}>Remove</Btn>
      </Card>)}
      {!bench.length&&<div style={{color:TEXT_D,fontSize:13,gridColumn:"1/-1",padding:20}}>No bench members yet. Add people to track available talent.</div>}
    </div>
    <Card style={{border:`1px solid ${GOLD}33`}}>
      <h3 style={{color:GOLD,margin:"0 0 12px",fontSize:14}}>STAFFING GAP ANALYSIS</h3>
      <Textarea value={gapText} onChange={setGapText} placeholder="Paste RFP key personnel requirements or describe the opportunity staffing needs..." rows={4}/>
      <Btn onClick={analyzeGaps} disabled={gapLoading||!gapText} style={{marginTop:10}}>{gapLoading?"⟳ Analyzing...":"Analyze Gaps vs Bench"}</Btn>
      {(gapLoading||gapResult)&&<div style={{marginTop:12}}><AIOut content={gapResult} loading={gapLoading} label="STAFFING GAP ANALYSIS"/></div>}
    </Card>
  </div>;
}

// ── WEEKLY DIGEST ─────────────────────────────────────────────────────────────
function WeeklyDigest(){
  const [focus,setFocus]=useState("");
  const [result,setResult]=useState("");
  const [loading,setLoading]=useState(false);
  const [digests,setDigests]=useState(()=>store.get("digests")||[]);

  const generate=async()=>{
    setLoading(true);
    const tracker=store.get("tracker")||[];
    const pipeline=tracker.slice(0,5).map(o=>`- ${o.title} (${o.stage}${o.opiScore?`, OPI:${o.opiScore}`:""})`).join("\n")||"No active pipeline entries";
    const txt=await callClaude(`Generate HGI Weekly Capture Intelligence Digest for week of ${new Date().toLocaleDateString("en-US",{weekday:"long",year:"numeric",month:"long",day:"numeric"})}.

${focus?`SPECIAL FOCUS: ${focus}`:""}

ACTIVE PIPELINE:
${pipeline}

Include:
## EXECUTIVE SUMMARY
4-5 bullet market intelligence highlights

## HOT OPPORTUNITIES
3-5 specific opportunities with: value, release date, HGI advantage, competition, action required

## RECOMPETE WATCHLIST
Current contracts approaching renewal

## INTELLIGENCE UPDATES
Policy/regulatory changes, market moves, funding announcements

## COMPETITIVE INTEL
Recent awards to competitors, market moves, personnel changes

## THIS WEEK'S CAPTURE PRIORITIES
5 specific actions with owners (TBD)

## UPCOMING DEADLINES
Industry events, RFP milestones

## MARKET TRENDS
FEMA PA, CDBG-DR, Gulf Coast activity`);
    setResult(txt);
    const newDigests=[{date:new Date().toLocaleDateString("en-US",{weekday:"long",year:"numeric",month:"long",day:"numeric"}),content:txt},...digests].slice(0,10);
    setDigests(newDigests);store.set("digests",newDigests);
    setLoading(false);
  };

  return <div>
    <h2 style={{color:GOLD,margin:"0 0 4px",fontSize:20,fontWeight:800}}>Weekly Digest</h2>
    <p style={{color:TEXT_D,margin:"0 0 20px",fontSize:12}}>AI-generated capture intelligence brief for HGI leadership</p>
    <Card style={{marginBottom:20}}>
      <Label text="SPECIAL FOCUS AREAS (optional)"/>
      <Input value={focus} onChange={setFocus} placeholder="e.g. FEMA PA recompetes, Texas TPA, Florida Helene/Milton..."/>
      <Btn onClick={generate} disabled={loading} style={{marginTop:12}}>
        {loading?"⟳ Generating...":"⟳ Generate This Week's Digest"}
      </Btn>
    </Card>
    <AIOut content={result} loading={loading} label="AI ANALYSIS"/>
    {digests.length>0&&<div style={{marginTop:24}}>
      <div style={{color:GOLD_D,fontSize:11,fontWeight:700,letterSpacing:"0.1em",marginBottom:10}}>ARCHIVED DIGESTS</div>
      {digests.map((d,i)=><div key={i} style={{padding:"10px 0",borderBottom:`1px solid ${BORDER}`,cursor:"pointer",color:i===0?GOLD:TEXT_D,fontSize:13}}
        onClick={()=>setResult(d.content)}>{d.date}</div>)}
    </div>}
  </div>;
}

class ErrorBoundary extends React.Component {
  constructor(props){super(props);this.state={error:null};}
  static getDerivedStateFromError(e){return {error:e.toString()};}
  render(){
    if(this.state.error) return React.createElement('div',
      {style:{padding:40,color:"#C9A84C",fontFamily:"monospace",background:"#0A0A0A",minHeight:"100vh"}},
      React.createElement('h2',null,"HGI System Error"),
      React.createElement('pre',{style:{color:"#E8E0D0",fontSize:12,marginTop:16,whiteSpace:"pre-wrap"}},this.state.error)
    );
    return this.props.children;
  }
}
ReactDOM.render(React.createElement(ErrorBoundary,null,React.createElement(App)), document.getElementById("root"));
</script>
