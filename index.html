// ── FINANCIAL ANALYSIS & PRICING ─────────────────────────────────────────────
function FinancialPricing({ sharedCtx={} }) {
  const LABOR_CATS = ["Program Manager","Deputy PM","Senior Program Manager","Grant Manager","Senior Analyst","Analyst","Associate Analyst","Data Specialist","GIS Specialist","Field Inspector","Case Manager","Housing Specialist","Financial Analyst","Compliance Officer","Quality Assurance","Administrative Support","IT Specialist","Legal/Policy Advisor","Communications Specialist","Training Coordinator"];
  const [activeTab, setActiveTab] = useState("intelligence");
  const [laborRows, setLaborRows] = useState(() => store.get("laborRows") || [
    {id:1, cat:"Program Manager", hours:2080, rawRate:95, fringe:0.28, overhead:0.15, ga:0.12, fee:0.10},
    {id:2, cat:"Senior Analyst", hours:2080, rawRate:65, fringe:0.28, overhead:0.15, ga:0.12, fee:0.10},
  ]);
  const [odcs, setOdcs] = useState(() => store.get("odcs") || [{id:1,desc:"Travel",amount:25000},{id:2,desc:"Other Direct Costs",amount:10000}]);
  const [periods, setPeriods] = useState(() => store.get("pricePeriods") || [{id:1,label:"Base Year",months:12,escalation:0},{id:2,label:"Option Year 1",months:12,escalation:3},{id:3,label:"Option Year 2",months:12,escalation:3}]);
  const [costNarrative, setCostNarrative] = useState("");
  const [narrativeLoading, setNarrativeLoading] = useState(false);
  const [scenario, setScenario] = useState({feeAdj:0, laborAdj:0, hoursAdj:0});

  // Price Intelligence Engine state
  const [intel, setIntel] = useState(() => store.get("priceIntel") || {
    contractType:"best_value", setAside:"none", pricingWeight:30,
    incumbent:"", incumbentAdvantage:"unknown",
    competitors:"ICF, Hagerty, Witt O'Brien's, Dewberry",
    estimatedValue:"", geography:"Louisiana", contractYears:"3",
    hgiMarginTarget:12, hgiIncumbent:false,
    evaluationModel:"best_value", protestRisk:"low"
  });
  const [ptwAnalysis, setPtwAnalysis] = useState(() => store.get("ptwAnalysis") || "");
  const [ptwLoading, setPtwLoading] = useState(false);
  const [marketRates, setMarketRates] = useState(() => store.get("marketRates") || "");
  const [marketLoading, setMarketLoading] = useState(false);
  const [evalModel, setEvalModel] = useState(() => store.get("evalModel") || {priceWeight:30, techWeight:40, pastPerfWeight:20, managementWeight:10});
  const [evalResult, setEvalResult] = useState(() => store.get("evalResult") || "");
  const [evalLoading, setEvalLoading] = useState(false);
  const [recommendedPrice, setRecommendedPrice] = useState(() => store.get("recommendedPrice") || null);

  const saveIntel = (u) => { const n={...intel,...u}; setIntel(n); store.set("priceIntel",n); };
  const saveLR = (rows) => { setLaborRows(rows); store.set("laborRows", rows); };
  const saveODC = (rows) => { setOdcs(rows); store.set("odcs", rows); };
  const savePeriods = (rows) => { setPeriods(rows); store.set("pricePeriods", rows); };

  // AI-powered full extraction — Claude reads the decomposition and returns structured data
  const [autoPopulating, setAutoPopulating] = useState(false);

  const autoPopulateFromSystem = async (force=false) => {
    const decomp = sharedCtx.decomposition || "";
    const brief = sharedCtx.execBrief || "";
    const research = sharedCtx.research || "";
    const wfState = store.get("wfState") || {};

    if (!decomp && !brief) return 0;

    setAutoPopulating(true);

    try {
      // Use Claude to extract ALL structured data from the decomposition
      const extractionPrompt = "Extract ALL pricing and staffing data from this RFP decomposition. Return ONLY a valid JSON object, no markdown, no explanation.\n\nReturn this exact structure:\n{\n  \"estimatedValue\": \"string — contract value as written\",\n  \"geography\": \"string — place of performance\",\n  \"contractYears\": \"string — e.g. 1 base + 2 options\",\n  \"baseYears\": number,\n  \"optionYears\": number,\n  \"contractType\": \"best_value|lpta|ffp|t_and_m|cost_plus\",\n  \"setAside\": \"none|8a|sdvosb|hubzone|wosb|sb\",\n  \"pricingWeight\": number,\n  \"techWeight\": number,\n  \"pastPerfWeight\": number,\n  \"managementWeight\": number,\n  \"incumbent\": \"string or empty\",\n  \"incumbentAdvantage\": \"unknown|strong|moderate|weak|none\",\n  \"hasFieldWork\": boolean,\n  \"hasTeaming\": boolean,\n  \"travelRequired\": boolean,\n  \"laborRoles\": [\n    {\n      \"role\": \"exact role title from RFP\",\n      \"quantity\": number,\n      \"hoursPerYear\": number,\n      \"seniorityLevel\": \"senior|mid|junior|admin\",\n      \"requiredCerts\": \"string or empty\"\n    }\n  ],\n  \"odcItems\": [\n    {\"description\": \"string\", \"estimatedAmount\": number}\n  ],\n  \"competitors\": [\"list of firms likely to bid based on contract type and geography\"]\n}\n\nFor laborRoles: extract EVERY role mentioned in key personnel, staffing, or requirements sections. If quantity not specified assume 1. For hoursPerYear: full time = 2080, part time = 1040, as needed = 520.\n\nFor odcItems: include travel, equipment, subcontracts, printing, IT, training — estimate amounts based on contract size and type.\n\nRFP DECOMPOSITION:\n" + decomp.slice(0,3000) + "\n\nEXECUTIVE BRIEF:\n" + brief.slice(0,800) + "\n\nRESEARCH:\n" + research.slice(0,500);

      const raw = await callClaude(extractionPrompt, "You are a government contract analyst. Return ONLY valid JSON. No markdown, no explanation, no backticks.", 2000);

      // Parse the JSON response
      let data;
      try {
        const clean = raw.replace(/```json|```/g,"").trim();
        const start = clean.indexOf("{");
        const end = clean.lastIndexOf("}");
        data = JSON.parse(clean.slice(start, end+1));
      } catch(e) {
        setAutoPopulating(false);
        alert("Could not parse extraction response. Try again.");
        return 0;
      }

      let populated = 0;

      // ── Update Price Intelligence fields ──
      const intelUpdates = {};
      if (data.estimatedValue) { intelUpdates.estimatedValue = data.estimatedValue; populated++; }
      if (data.geography) { intelUpdates.geography = data.geography; populated++; }
      if (data.contractYears) { intelUpdates.contractYears = data.contractYears; populated++; }
      if (data.contractType) { intelUpdates.contractType = data.contractType; populated++; }
      if (data.setAside) { intelUpdates.setAside = data.setAside; populated++; }
      if (data.pricingWeight) { intelUpdates.pricingWeight = data.pricingWeight; populated++; }
      if (data.incumbent !== undefined) { intelUpdates.incumbent = data.incumbent; populated++; }
      if (data.incumbentAdvantage) { intelUpdates.incumbentAdvantage = data.incumbentAdvantage; populated++; }
      if (data.competitors && data.competitors.length > 0) {
        // Also add any from research text scan
        const competitorList = ["ICF","Hagerty","Witt O'Brien's","Dewberry","Guidehouse","Tetra Tech","LPA Group","Sikich","Cloudburst","IEM","CDM Smith","Booz Allen","Leidos","Baker Tilly","RSM"];
        const allText = decomp + " " + brief + " " + research;
        const foundExtra = competitorList.filter(c => allText.toLowerCase().includes(c.toLowerCase()) && !data.competitors.some(dc => dc.toLowerCase().includes(c.toLowerCase())));
        intelUpdates.competitors = [...new Set([...data.competitors, ...foundExtra])].join(", ");
        populated++;
      }
      if (Object.keys(intelUpdates).length) saveIntel(intelUpdates);

      // ── Update Eval Score Model weights ──
      if (data.pricingWeight || data.techWeight || data.pastPerfWeight || data.managementWeight) {
        const newEval = {...evalModel};
        if (data.pricingWeight) newEval.priceWeight = data.pricingWeight;
        if (data.techWeight) newEval.techWeight = data.techWeight;
        if (data.pastPerfWeight) newEval.pastPerfWeight = data.pastPerfWeight;
        if (data.managementWeight) newEval.managementWeight = data.managementWeight;
        // If weights don't sum to 100, normalize
        const sum = newEval.priceWeight + newEval.techWeight + newEval.pastPerfWeight + newEval.managementWeight;
        if (sum > 0 && sum !== 100) {
          newEval.priceWeight = Math.round(newEval.priceWeight / sum * 100);
          newEval.techWeight = Math.round(newEval.techWeight / sum * 100);
          newEval.pastPerfWeight = Math.round(newEval.pastPerfWeight / sum * 100);
          newEval.managementWeight = 100 - newEval.priceWeight - newEval.techWeight - newEval.pastPerfWeight;
        }
        setEvalModel(newEval);
        store.set("evalModel", newEval);
        populated++;
      }

      // ── Build Period Pricing from contract structure ──
      const baseYrs = data.baseYears || 1;
      const optYrs = data.optionYears || 2;
      const newPeriods = [{id:1, label:"Base Year", months:12, escalation:0}];
      for (let i=1; i<=optYrs; i++) {
        newPeriods.push({id:i+1, label:"Option Year "+i, months:12, escalation:3});
      }
      savePeriods(newPeriods);
      populated++;

      // ── Build Labor Rows from extracted roles ──
      const roleRates = {
        "senior": {rawRate:110, fringe:0.28, overhead:0.15, ga:0.12, fee:0.10},
        "mid":    {rawRate:75,  fringe:0.28, overhead:0.15, ga:0.12, fee:0.10},
        "junior": {rawRate:55,  fringe:0.28, overhead:0.15, ga:0.12, fee:0.09},
        "admin":  {rawRate:38,  fringe:0.28, overhead:0.15, ga:0.12, fee:0.08},
      };
      // Role-specific rate overrides
      const roleOverrides = {
        "program manager": {rawRate:120, seniority:"senior"},
        "deputy program manager": {rawRate:100, seniority:"senior"},
        "deputy pm": {rawRate:100, seniority:"senior"},
        "senior program manager": {rawRate:130, seniority:"senior"},
        "project manager": {rawRate:105, seniority:"senior"},
        "grant manager": {rawRate:90, seniority:"senior"},
        "senior grant manager": {rawRate:100, seniority:"senior"},
        "financial analyst": {rawRate:80, seniority:"mid"},
        "senior financial analyst": {rawRate:95, seniority:"senior"},
        "compliance officer": {rawRate:85, seniority:"mid"},
        "compliance manager": {rawRate:95, seniority:"senior"},
        "data specialist": {rawRate:68, seniority:"mid"},
        "gis specialist": {rawRate:70, seniority:"mid"},
        "it specialist": {rawRate:75, seniority:"mid"},
        "field inspector": {rawRate:55, seniority:"junior"},
        "case manager": {rawRate:58, seniority:"junior"},
        "housing specialist": {rawRate:68, seniority:"mid"},
        "quality assurance": {rawRate:75, seniority:"mid"},
        "quality control": {rawRate:75, seniority:"mid"},
        "training coordinator": {rawRate:62, seniority:"mid"},
        "communications specialist": {rawRate:65, seniority:"mid"},
        "administrative support": {rawRate:40, seniority:"admin"},
        "administrative assistant": {rawRate:38, seniority:"admin"},
        "legal advisor": {rawRate:120, seniority:"senior"},
        "policy advisor": {rawRate:110, seniority:"senior"},
      };

      if (data.laborRoles && data.laborRoles.length > 0) {
        const newLaborRows = [];
        data.laborRoles.forEach((role, idx) => {
          const roleKey = (role.role||"").toLowerCase();
          const override = Object.entries(roleOverrides).find(([k]) => roleKey.includes(k));
          const seniority = override?.[1]?.seniority || role.seniorityLevel || "mid";
          const baseRates = roleRates[seniority] || roleRates["mid"];
          const rawRate = override?.[1]?.rawRate || baseRates.rawRate;
          const qty = role.quantity || 1;
          const hoursPerPerson = role.hoursPerYear || 2080;

          for (let q=0; q<Math.min(qty,3); q++) {
            newLaborRows.push({
              id: Date.now() + idx*10 + q,
              cat: role.role || "Analyst",
              hours: hoursPerPerson,
              rawRate,
              fringe: baseRates.fringe,
              overhead: baseRates.overhead,
              ga: baseRates.ga,
              fee: baseRates.fee
            });
          }
        });

        // Ensure PM is always first
        const pmIdx = newLaborRows.findIndex(r => r.cat.toLowerCase().includes("program manager"));
        if (pmIdx > 0) { const pm = newLaborRows.splice(pmIdx,1)[0]; newLaborRows.unshift(pm); }
        if (newLaborRows.length > 0) { saveLR(newLaborRows); populated++; }
      }

      // ── Build ODCs from extracted items ──
      if (data.odcItems && data.odcItems.length > 0) {
        const newODCs = data.odcItems.map((item, idx) => ({
          id: idx+1,
          desc: item.description,
          amount: item.estimatedAmount || 0
        }));
        saveODC(newODCs);
        populated++;
      } else {
        // Fallback ODC logic
        const travelAmt = data.travelRequired ? (data.hasFieldWork ? 75000 : 35000) : 25000;
        const newODCs = [{id:1, desc:"Travel & Transportation", amount:travelAmt}, {id:2, desc:"Other Direct Costs", amount:15000}];
        if (data.hasTeaming) newODCs.push({id:3, desc:"Subcontractor Support", amount:100000});
        saveODC(newODCs);
        populated++;
      }

      setAutoPopulating(false);
      return populated;

    } catch(err) {
      setAutoPopulating(false);
      console.error("Auto-populate error:", err);
      return 0;
    }
  };

  // Auto-populate on mount when data is available
  useEffect(() => {
    if (sharedCtx.decomposition && !autoPopulating) {
      autoPopulateFromSystem(false);
    }
  }, [sharedCtx.decomposition, sharedCtx.execBrief, sharedCtx.research]);

  const calcRow = (r, feeAdj=0, laborAdj=0, hoursAdj=0) => {
    const raw = parseFloat(r.rawRate||0) * (1 + laborAdj/100);
    const fringe = raw * parseFloat(r.fringe||0);
    const overhead = (raw + fringe) * parseFloat(r.overhead||0);
    const ga = (raw + fringe + overhead) * parseFloat(r.ga||0);
    const cost = raw + fringe + overhead + ga;
    const feeRate = parseFloat(r.fee||0) + feeAdj/100;
    const loaded = cost * (1 + feeRate);
    const hours = parseFloat(r.hours||0) * (1 + hoursAdj/100);
    return { raw, fringe, overhead, ga, cost, loaded, hours, total: loaded * hours };
  };

  const totalLabor = (feeAdj=0, laborAdj=0, hoursAdj=0) =>
    laborRows.reduce((sum, r) => sum + calcRow(r, feeAdj, laborAdj, hoursAdj).total, 0);
  const totalODC = () => odcs.reduce((sum, o) => sum + parseFloat(o.amount||0), 0);
  const fmt = (n) => "$" + Math.round(n).toLocaleString();
  const periodTotal = (p, idx) => {
    const esc = Math.pow(1 + (parseFloat(p.escalation||0)/100), idx);
    return (totalLabor() * esc + totalODC()) * (parseFloat(p.months||12)/12);
  };
  const contractTotal = () => periods.reduce((sum, p, i) => sum + periodTotal(p, i), 0);
  const profitMargin = () => {
    const t = totalLabor();
    const cost = laborRows.reduce((sum, r) => sum + calcRow(r).cost * calcRow(r).hours, 0);
    return t > 0 ? ((t - cost) / t * 100).toFixed(1) : 0;
  };

  const runMarketRates = async () => {
    setMarketLoading(true);
    const decomp = sharedCtx.decomposition ? sharedCtx.decomposition.slice(0,1200) : "";
    const research = sharedCtx.research ? sharedCtx.research.slice(0,1000) : "";
    const brief = sharedCtx.execBrief ? sharedCtx.execBrief.slice(0,600) : "";
    const roles = laborRows.map(r => r.cat).join(", ");
    const prompt = "You are a government contract pricing expert. Analyze current market labor rates for this specific opportunity.\n\nOPPORTUNITY: " + (sharedCtx.title||"Disaster Recovery Grant Management") + "\nAGENCY: " + (sharedCtx.agency||"Louisiana State Agency") + "\nGEOGRAPHY: " + intel.geography + "\nCONTRACT TYPE: " + intel.contractType + "\nSET-ASIDE: " + intel.setAside + "\nESTIMATED VALUE: " + intel.estimatedValue + "\nCONTRACT YEARS: " + intel.contractYears + "\nKNOWN COMPETITORS: " + intel.competitors + "\nINCUMBENT: " + (intel.incumbent||"Unknown") + "\nROLES NEEDED: " + roles + "\n\nRFP DECOMPOSITION:\n" + decomp + "\n\nCOMPETITIVE RESEARCH:\n" + research + "\n\nEXECUTIVE BRIEF CONTEXT:\n" + brief + "\n\nUsing ALL of the above context, provide:\n1. MARKET RATE ANALYSIS — for each role: GSA Schedule range, competitive market range, Louisiana/Gulf Coast locality adjustment, recommended raw rate for HGI\n2. COMPETITOR INDIRECT RATES — based on research intel, model the likely fringe/OH/G&A/fee structure for each identified competitor\n3. GEOGRAPHY & LOCALITY FACTORS — how this specific geography and agency affect rates\n4. SET-ASIDE IMPACT — how " + intel.setAside + " status reshapes the bidder pool\n5. INCUMBENT RATE ADVANTAGE — how " + (intel.incumbent||"the incumbent") + " likely prices given their position\n6. RATE RED FLAGS — specific rates that raise evaluator concerns for this contract type\n7. HGI RATE POSITIONING — exactly where HGI should land on each role to be competitive AND credible";
    const result = await callClaude(prompt, "You are a senior pricing strategist specializing in government disaster recovery and grants management contracts. Be specific with dollar figures. Reference the research data provided. " + HGI_CONTEXT, 4000);
    setMarketRates(result);
    store.set("marketRates", result);
    setMarketLoading(false);
  };

  const runPTW = async () => {
    setPtwLoading(true);
    const hgiCost = fmt(contractTotal() || totalLabor() + totalODC());
    const decomp = sharedCtx.decomposition ? sharedCtx.decomposition.slice(0,1000) : "";
    const execBrief = sharedCtx.execBrief ? sharedCtx.execBrief.slice(0,800) : "";
    const research = sharedCtx.research ? sharedCtx.research.slice(0,1000) : "";
    const marketContext = marketRates ? "\n\nMARKET RATE ANALYSIS (already completed):\n" + marketRates.slice(0,800) : "";
    const prompt = "You are a Price-to-Win expert. Build a comprehensive PTW analysis using ALL available intelligence for this specific opportunity.\n\nOPPORTUNITY: " + (sharedCtx.title||"Disaster Recovery Grant Management") + "\nAGENCY: " + (sharedCtx.agency||"Louisiana Agency") + "\nESTIMATED VALUE: " + intel.estimatedValue + "\nGEOGRAPHY: " + intel.geography + "\nCONTRACT YEARS: " + intel.contractYears + "\nCONTRACT TYPE: " + intel.contractType + "\nEVALUATION MODEL: " + intel.evaluationModel + "\nPRICE WEIGHT: " + evalModel.priceWeight + "%\nSET-ASIDE: " + intel.setAside + "\nINCUMBENT: " + (intel.incumbent||"Unknown") + "\nINCUMBENT ADVANTAGE: " + intel.incumbentAdvantage + "\nHGI IS INCUMBENT: " + intel.hgiIncumbent + "\nIDENTIFIED COMPETITORS: " + intel.competitors + "\nHGI TARGET MARGIN: " + intel.hgiMarginTarget + "%\nHGI CURRENT COST BUILDUP: " + hgiCost + "\nPROTEST RISK TOLERANCE: " + intel.protestRisk + "\n\nRFP DECOMPOSITION:\n" + decomp + "\n\nEXECUTIVE BRIEF:\n" + execBrief + "\n\nCOMPETITIVE RESEARCH INTEL:\n" + research + marketContext + "\n\nUsing ALL of the above intelligence, provide a COMPLETE Price-to-Win analysis:\n\n## 1. LIKELY BIDDER POOL\nBased on research and contract characteristics, identify ALL likely bidders for THIS specific opportunity (not generic — use the research data to determine who is active in this market, this agency, and this contract type). Include small businesses if set-aside applies.\n\n## 2. COMPETITOR-BY-COMPETITOR PRICING MODEL\nFor each likely bidder: estimated bid range, known indirect rate structure, incumbent/relationship advantage, likely pricing strategy, and HGI head-to-head assessment\n\n## 3. INCUMBENT ANALYSIS\nDetailed analysis of " + (intel.incumbent||"the incumbent") + ": pricing advantage, re-bid strategy, relationship equity, agency satisfaction signals from research\n\n## 4. EVALUATION SCORE MODELING\nWith price weighted at " + evalModel.priceWeight + "%:\n- Show HGI's evaluated score at aggressive / value / premium price points\n- Model competitor evaluated scores\n- Identify the price crossover point where HGI wins on total evaluated score\n\n## 5. PRICE SENSITIVITY ANALYSIS\n- Impact of each $100K change on win probability\n- Price floor (protest risk threshold)\n- Price ceiling (losing on price to competitors)\n\n## 6. HGI WIN PRICE RECOMMENDATION\nThree specific dollar scenarios:\n- AGGRESSIVE: exact price, win probability %, margin %, risk\n- VALUE: exact price, win probability %, margin % — RECOMMENDED\n- PREMIUM: exact price, win probability %, justification required\n\n## 7. PRICING STRATEGY NARRATIVE\nThe specific strategy HGI should execute, referencing HGI's past performance advantages (Road Home, BP GCCF, Jefferson Parish) as justification for premium positioning if applicable\n\n## 8. RED FLAGS & RISKS";
    const result = await callClaude(prompt, "You are a senior PTW analyst with 20 years in government contracting. Be specific with dollar amounts, percentages, and competitor names. Use all research data provided. " + HGI_CONTEXT, 4000);

        return (

                {label:"CONTRACT TOTAL", value:fmt(contractTotalAmt), color:GREEN, tab:"periods",
                  detail: periods.map((p,i)=>p.label+": "+fmt(periodTotal(p,i))).join(" · ")},
                {label:"PROFIT MARGIN", value:marginPct+"%", color:marginColor, tab:"buildup",
                  detail: "Target: "+intel.hgiMarginTarget+"% · Fee earned: "+fmt(totalFee) + " · Cost base: "+fmt(totalCost)},
                {label:"LABOR TOTAL", value:fmt(laborTotal), color:TEXT, tab:"buildup",
                  detail: laborRows.map(r=>r.cat+": "+fmt(calcRow(r).total)).join(" · ")},
                {label:"ODCs", value:fmt(odcTotal), color:TEXT, tab:"buildup",
                  detail: odcs.map(o=>o.desc+": "+fmt(parseFloat(o.amount||0))).join(" · ")},
                {label:"WIN PRICE", value:recommendedPrice ? fmt(recommendedPrice) : "Run PTW →", color:recommendedPrice?BLUE:TEXT_D, tab:"intelligence",
                  detail: recommendedPrice ? "Gap to buildup: "+fmt(recommendedPrice-contractTotalAmt) : "Click Price Intelligence → Run PTW Analysis"},
              ].map(stat => (
                <div key={stat.label} onClick={()=>setActiveTab(stat.tab)} style={{

                <div style={{display:"flex",gap:16,fontSize:10,color:TEXT_D}}>

                  <span><span style={{color:BLUE}}>■</span> ODCs {(odcTotal/contractTotalAmt*100).toFixed(0)}% — {fmt(odcTotal)}</span>

                </div>
              </div>
            )}
          </div>
        );
      })()}

      {activeTab === "intelligence" && (
        <div>
          <Card style={{marginBottom:16,border:`1px solid ${GOLD}44`}}>
            <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:4,flexWrap:"wrap",gap:8}}>

                <div style={{color:GOLD,fontWeight:700,fontSize:14,marginBottom:4}}>PRICE INTELLIGENCE ENGINE</div>

// ── OPPORTUNITY DISCOVERY ENGINE ─────────────────────────────────────────────
function OpportunityDiscovery({ saveSharedCtx, goToWorkflow }) {
  const [activeTab, setActiveTab] = useState("hunt");
  const [hunting, setHunting] = useState(false);
  const [huntResults, setHuntResults] = useState(() => store.get("huntResults") || []);
  const [lastHunted, setLastHunted] = useState(() => store.get("lastHunted") || null);
  const [selectedResult, setSelectedResult] = useState(null);
  const [sendingToWorkflow, setSendingToWorkflow] = useState(null);
  const [huntConfig, setHuntConfig] = useState(() => store.get("huntConfig") || {
    verticals: ["disaster","tpa","workforce","health","infrastructure","tax_appeals","federal"],
    states: ["LA","TX","FL","MS","AL","GA"],
    minValue: 0,
    urgentDays: 21,
    sources: ["sam","state_procurement","insurance_assoc","municipal","federal_grants","disaster_signals"]
  });
  const [disasterAlerts, setDisasterAlerts] = useState(() => store.get("disasterAlerts") || []);
  const [fundingAlerts, setFundingAlerts] = useState(() => store.get("fundingAlerts") || []);
  const [alertsLoading, setAlertsLoading] = useState(false);
  const [filterVertical, setFilterVertical] = useState("all");
  const [filterState, setFilterState] = useState("all");
  const [filterUrgent, setFilterUrgent] = useState(false);
  const [sortBy, setSortBy] = useState("opi");

  // ── DOCUMENT RETRIEVAL STATE ──
  const [fetchUrl, setFetchUrl] = useState("");
  const [fetchLoading, setFetchLoading] = useState(false);
  const [fetchResult, setFetchResult] = useState(null);
  const [fetchError, setFetchError] = useState(null);
  const [retrievedDocs, setRetrievedDocs] = useState(() => store.get("retrievedDocs") || []);
  const [analyzingDoc, setAnalyzingDoc] = useState(null);
  const [oppFetchStatus, setOppFetchStatus] = useState({}); // per-opportunity fetch status

  // ── FETCH RFP FROM URL ──
  const fetchRfp = async (url, oppId = null) => {
    if (!url) return;
    if (oppId) setOppFetchStatus(s => ({...s, [oppId]: "fetching"}));
    else { setFetchLoading(true); setFetchError(null); setFetchResult(null); }

    try {
      const res = await fetch("/api/fetch-rfp", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ url })
      });
      const data = await res.json();

      if (!data.success) {
        const errMsg = data.error || "Could not retrieve page";
        if (oppId) setOppFetchStatus(s => ({...s, [oppId]: "error: " + errMsg}));
        else { setFetchError(errMsg); setFetchLoading(false); }
        return null;
      }

      if (oppId) setOppFetchStatus(s => ({...s, [oppId]: "analyzing"}));
      else setFetchResult(data);

      // Analyze the retrieved content with Claude
      const docContent = data.textContent || "";
      const docLinks = data.docLinks || [];
      const fetchedDocs = data.fetchedDocs || [];

      // Build analysis prompt
      const analysisPrompt = `Analyze this procurement opportunity page retrieved from: ${url}

PAGE TITLE: ${data.title || "Unknown"}
${data.samData ? "SAM.GOV DATA: " + JSON.stringify(data.samData) : ""}
${data.lapacData ? "LAPAC DATA: " + JSON.stringify(data.lapacData) : ""}

PAGE CONTENT (first 8000 chars):
${docContent.slice(0, 8000)}

DOCUMENT LINKS FOUND: ${docLinks.map(d => d.name + " — " + d.url).join("\n")}

${fetchedDocs.length > 0 ? "DOCUMENTS RETRIEVED: " + fetchedDocs.map(d => d.name).join(", ") : ""}

Extract and return as JSON:
{
  "title": "opportunity title",
  "agency": "issuing agency",
  "solicitationNumber": "solicitation/bid number if found",
  "dueDate": "response/submission deadline",
  "estimatedValue": "contract value if mentioned",
  "setAside": "set-aside status",
  "naics": "NAICS code if listed",
  "description": "2-3 sentence summary of what this contract is",
  "scopeOfWork": ["bullet 1", "bullet 2", "bullet 3", "bullet 4"],
  "keyRequirements": ["requirement 1", "requirement 2"],
  "isRfp": true/false,
  "rfpText": "full extracted RFP text suitable for HGI Full Workflow — as much detail as possible",
  "documentLinks": [{"name": "...", "url": "..."}],
  "hgiRelevance": "HIGH|MEDIUM|LOW",
  "hgiFit": "1-2 sentences on why or why not this fits HGI",
  "immediateAction": "what HGI should do right now"
}`;

      const analysis = await callClaude(analysisPrompt,
        "You are an expert government contracting analyst for HGI. Extract all procurement data from the provided page content. Return ONLY valid JSON.",
        3000
      );

      let analyzed;
      try {
        const clean = analysis.replace(/```json|```/g,"").trim();
        const s = clean.indexOf("{"), e = clean.lastIndexOf("}");
        analyzed = JSON.parse(clean.slice(s, e+1));
      } catch(err) {
        analyzed = { title: data.title, description: docContent.slice(0,300), rfpText: docContent };
      }

      // Attach doc links from retrieval
      analyzed.documentLinks = [...(analyzed.documentLinks||[]), ...docLinks.slice(0,10)];
      analyzed.fetchedDocs = fetchedDocs;
      analyzed.sourceUrl = url;
      analyzed.retrievedAt = new Date().toISOString();

      // Save to retrieved docs library
      const newDoc = { id: Date.now(), ...analyzed };
      const updated = [newDoc, ...retrievedDocs.filter(d => d.sourceUrl !== url)].slice(0, 50);
      setRetrievedDocs(updated);
      store.set("retrievedDocs", updated);

      if (oppId) {
        setOppFetchStatus(s => ({...s, [oppId]: "done"}));
        // Also update the hunt result with the analyzed data
        setHuntResults(prev => prev.map(o => o.id === oppId ? {
          ...o,
          description: analyzed.description || o.description,
          scopeOfWork: analyzed.scopeOfWork || o.scopeOfWork,
          solicitationNumber: analyzed.solicitationNumber,
          dueDate: analyzed.dueDate,
          rfpText: analyzed.rfpText,
          documentsRetrieved: true,
          documentLinks: analyzed.documentLinks,
        } : o));
      } else {
        setFetchResult({...data, analyzed});
        setFetchLoading(false);
      }

      return analyzed;
    } catch(err) {
      console.error("fetchRfp error:", err);
      if (oppId) setOppFetchStatus(s => ({...s, [oppId]: "error: " + err.message}));
      else { setFetchError(err.message); setFetchLoading(false); }
      return null;
    }
  };

  // Send retrieved doc to Full Workflow
  const sendDocToWorkflow = (doc) => {
    saveSharedCtx({
      title: doc.title || "Retrieved Opportunity",
      agency: doc.agency || "",
      rfpText: doc.rfpText || doc.description || "",
      decomposition: "",
      execBrief: "",
    });
    goToWorkflow();
  };

  const VERTICALS = [
    {id:"disaster", label:"Disaster Recovery / CDBG-DR", icon:"?"},
    {id:"tpa", label:"TPA / Claims / Insurance", icon:"?"},
    {id:"workforce", label:"Workforce & Social Services", icon:"?"},
    {id:"health", label:"Health & Human Services", icon:"?"},
    {id:"infrastructure", label:"Infrastructure & Capital", icon:"?"},
    {id:"tax_appeals", label:"Property Tax Appeals", icon:"?"},
    {id:"federal", label:"Federal Agencies", icon:"⚪"},
  ];

  const SOURCES = [
    {id:"sam", label:"SAM.gov", desc:"Federal contracting opportunities"},
    {id:"state_procurement", label:"State Procurement Portals", desc:"LA/TX/FL/MS/AL/GA state portals"},
    {id:"insurance_assoc", label:"Insurance Associations", desc:"LA Citizens, TX Windpool, FL Citizens, TPCIGA"},
    {id:"municipal", label:"Municipal & Parish", desc:"Cities, parishes, counties, housing authorities"},
    {id:"federal_grants", label:"Federal Grant Signals", desc:"HUD, FEMA, Treasury, USDA allocations"},
    {id:"disaster_signals", label:"Disaster & Funding Signals", desc:"Declarations, BRIC/HMGP notices, DR allocations"},
  ];

  const STATE_AGENCIES = {
    LA: ["Louisiana Housing Corporation (LHC)", "GOHSEP", "OCD-DRU", "Louisiana Citizens Property Insurance", "Louisiana Workforce Commission", "Louisiana Department of Health", "LCDBG", "LaPAC", "City of New Orleans", "East Baton Rouge Parish", "Jefferson Parish", "Terrebonne Parish", "All Louisiana Housing Authorities"],
    TX: ["Texas GLO", "TDEM", "Texas Windstorm Insurance Association (TWIA)", "TPCIGA", "Texas SmartBuy", "Texas Housing Finance Agencies", "Major Texas metros", "County appraisal districts"],
    FL: ["Florida DEO", "Florida Division of Emergency Management (FDEM)", "Florida Citizens Property Insurance", "Florida Housing Finance Corporation", "Major Florida counties", "County property appraisers / tax authorities"],
    MS: ["MEMA", "Mississippi Development Authority (MDA)", "Mississippi Home Corporation", "State procurement portal", "Municipal contracts", "County tax appeal boards"],
    AL: ["AEMA", "Alabama Housing Finance Authority", "State procurement", "Municipal and county opportunities"],
    GA: ["GEMA", "Georgia DCA", "Atlanta metro agencies", "Municipal tax administration", "Workforce agencies"],
  };

  const [expandedCard, setExpandedCard] = useState(null);

  // ── REAL DATA FROM SUPABASE ──
  const loadOpportunities = async (filters = {}) => {
    setHunting(true);
    try {
      const params = new URLSearchParams({
        includeRuns: "true",
        includeSignals: "true",
        limit: "100",
        sort: "opi_score.desc",
        ...filters,
      });
      const res = await fetch(`/api/opportunities?${params}`);
      const data = await res.json();
      if (data.opportunities) {
        // Map from snake_case DB fields to camelCase UI fields
        const mapped = data.opportunities.map(o => ({
          id: o.id,
          title: o.title,
          agency: o.agency,
          state: o.state,
          vertical: o.vertical,
          estimatedValue: o.estimated_value,
          timing: o.due_date ? `Due: ${o.due_date}` : o.timing || "See source",
          source: o.source,
          sourceUrl: o.source_url,
          opiScore: o.opi_score,
          urgency: o.urgency,
          strategicImportance: o.strategic_importance,
          recompete: o.recompete,
          incumbent: o.incumbent,
          description: o.description,
          scopeOfWork: o.scope_of_work,
          whyHgiWins: o.why_hgi_wins,
          keyRequirements: o.key_requirements,
          captureAction: o.capture_action,
          hgiRelevance: o.hgi_relevance,
          hgiFit: o.hgi_fit,
          rfpText: o.rfp_text,
          solicitationNumber: o.solicitation_number,
          dueDate: o.due_date,
          naics: o.naics,
          setAside: o.set_aside,
          documentLinks: o.documents || [],
          documentsRetrieved: o.documents_fetched,
          savedToTracker: o.saved_to_tracker,
          discoveredAt: o.discovered_at,
          analyzedAt: o.analyzed_at,
        }));
        setHuntResults(mapped);
        store.set("huntResults", mapped);
      }
      if (data.huntRuns?.length > 0) {
        setLastHunted(data.huntRuns[0].run_at);
        store.set("lastHunted", data.huntRuns[0].run_at);
      }
      if (data.signals) {
        const disaster = data.signals.filter(s => s.type === "disaster");
        const funding = data.signals.filter(s => s.type === "funding");
        setDisasterAlerts(disaster);
        setFundingAlerts(funding);
      }
    } catch(err) {
      console.error("Load opportunities error:", err);
    }
    setHunting(false);
  };

  const triggerHunt = async () => {
    setHunting(true);
    try {
      const res = await fetch("/api/hunt", { method: "POST" });
      const data = await res.json();
      if (data.success) {
        // After hunt completes, reload from DB
        await loadOpportunities();
        alert(`✓ Hunt complete — ${data.fetched} opportunities fetched, ${data.analyzed} analyzed and scored`);
      } else {
        alert("Hunt encountered an error: " + (data.error || "Unknown error"));
      }
    } catch(err) {
      alert("Hunt failed: " + err.message);
    }
    setHunting(false);
  };

  // Load on mount
  useEffect(() => { loadOpportunities(); }, []);

  const sendToWorkflow = (opp) => {
    setSendingToWorkflow(opp.id);
    const rfpContext = `OPPORTUNITY: ${opp.title}\nAGENCY: ${opp.agency}\nSTATE: ${opp.state}\nVERTICAL: ${opp.vertical}\nESTIMATED VALUE: ${opp.estimatedValue}\nTIMING: ${opp.timing}\nSOURCE: ${opp.source}\nWHY HGI WINS: ${Array.isArray(opp.whyHgiWins) ? opp.whyHgiWins.join("; ") : opp.whyHgiWins}\nINCUMBENT: ${opp.incumbent || "Unknown"}\nOPI SCORE: ${opp.opiScore}`;
    saveSharedCtx({ title: opp.title, agency: opp.agency, rfpText: rfpContext, decomposition: "", execBrief: "" });
    setTimeout(() => { setSendingToWorkflow(null); goToWorkflow(); }, 300);
  };

  const saveToTracker = (opp) => {
    const tracker = store.get("tracker") || [];
    const entry = {
      id: opp.id,
      title: opp.title,
      agency: opp.agency,
      value: opp.estimatedValue,
      stage: opp.urgency === "IMMEDIATE" ? "pursuing" : "identified",
      decision: opp.opiScore >= 70 ? "GO" : opp.opiScore >= 50 ? "CONDITIONAL GO" : "WATCHLIST",
      opiScore: opp.opiScore,
      geography: opp.state,
      type: opp.vertical,
      addedDate: new Date().toISOString(),
      notes: `Discovered via Hunt Engine · ${opp.timing} · ${opp.source}`,
    };
    store.set("tracker", [entry, ...tracker]);
    const updated = huntResults.map(r => r.id === opp.id ? {...r, savedToTracker: true} : r);
    setHuntResults(updated);
    store.set("huntResults", updated);
  };

  // Filter and sort results
  const filtered = huntResults.filter(o => {
    if (filterVertical !== "all" && o.vertical !== filterVertical) return false;
    if (filterState !== "all" && o.state !== filterState) return false;
    if (filterUrgent && o.urgency !== "IMMEDIATE") return false;
    return true;
  }).sort((a,b) => {
    if (sortBy === "opi") return (b.opiScore||0) - (a.opiScore||0);
    if (sortBy === "urgency") { const u={"IMMEDIATE":0,"ACTIVE":1,"PIPELINE":2,"WATCH":3}; return (u[a.urgency]||3)-(u[b.urgency]||3); }
    if (sortBy === "value") return (parseFloat((b.estimatedValue||"0").replace(/[^0-9.]/g,""))||0) - (parseFloat((a.estimatedValue||"0").replace(/[^0-9.]/g,""))||0);
    return 0;
  });

  const urgencyColor = u => u==="IMMEDIATE"?RED:u==="ACTIVE"?GOLD:u==="PIPELINE"?BLUE:TEXT_D;
  const tierColor = t => t==="TIER_1"?GREEN:t==="TIER_2"?GOLD:TEXT_D;
  const verticalIcon = v => VERTICALS.find(x=>x.id===v)?.icon || "◆";
  const opiColor = s => s>=75?GREEN:s>=55?GOLD:s>=35?ORANGE:RED;

  const TABS = [
    {id:"hunt", label:"? Hunt Engine"},
    {id:"results", label:`? Results ${huntResults.length>0?"("+huntResults.length+")":""}`},
    {id:"retrieve", label:`? Retrieve Docs ${retrievedDocs.length>0?"("+retrievedDocs.length+")":""}`},
    {id:"signals", label:`⚡ Signals ${(disasterAlerts.length+fundingAlerts.length)>0?"("+(disasterAlerts.length+fundingAlerts.length)+")":""}`},
    {id:"sources", label:"? Sources & Config"},
  ];

  return (
    <div>
      <div style={{marginBottom:4}}>
        <h2 style={{color:GOLD,margin:0,fontSize:20,fontWeight:800}}>Opportunity Discovery Engine</h2>
        <p style={{color:TEXT_D,margin:"4px 0 0",fontSize:12}}>Hunt · Find · Score · Recommend · Win — across all HGI verticals simultaneously</p>
      </div>

      {/* Status bar */}
      <div style={{display:"flex",gap:10,marginBottom:14,flexWrap:"wrap"}}>
        {[
          ["Total Hunted", huntResults.length, GOLD],
          ["Tier 1", huntResults.filter(o=>o.strategicImportance==="TIER_1"||o.opiScore>=75).length, GREEN],
          ["Immediate Action", huntResults.filter(o=>o.urgency==="IMMEDIATE").length, RED],
          ["Saved to Tracker", huntResults.filter(o=>o.savedToTracker).length, BLUE],
          ["Signals", disasterAlerts.length+fundingAlerts.length, ORANGE],
        ].map(([l,v,c])=>(
          <div key={l} style={{background:BG2,border:`1px solid ${c}33`,borderRadius:6,padding:"8px 14px",flex:1,minWidth:100,borderBottom:`3px solid ${c}44`}}>
            <div style={{fontSize:20,fontWeight:800,color:c}}>{v}</div>
            <div style={{fontSize:10,color:TEXT_D,letterSpacing:"0.06em"}}>{l.toUpperCase()}</div>
          </div>
        ))}
        {lastHunted && <div style={{background:BG2,border:`1px solid ${BORDER}`,borderRadius:6,padding:"8px 14px",flex:1,minWidth:120}}>
          <div style={{fontSize:11,color:GREEN,fontWeight:700}}>Last Hunt</div>
          <div style={{fontSize:10,color:TEXT_D}}>{new Date(lastHunted).toLocaleDateString()} {new Date(lastHunted).toLocaleTimeString([], {hour:"2-digit",minute:"2-digit"})}</div>
        </div>}
      </div>

      {/* Tabs */}
      <div style={{display:"flex",gap:4,marginBottom:16,borderBottom:`1px solid ${BORDER}`,paddingBottom:8,flexWrap:"wrap"}}>
        {TABS.map(t=>(
          <button key={t.id} onClick={()=>setActiveTab(t.id)} style={{padding:"7px 16px",borderRadius:4,fontSize:12,cursor:"pointer",fontFamily:"inherit",border:"none",background:activeTab===t.id?GOLD:BG3,color:activeTab===t.id?"#000":TEXT_D,fontWeight:activeTab===t.id?700:400}}>{t.label}</button>
        ))}
      </div>

      {/* ── HUNT ENGINE ── */}
      {activeTab === "hunt" && (
        <div>
          <Card style={{marginBottom:16,border:`1px solid ${GOLD}44`}}>
            <div style={{color:GOLD,fontWeight:700,fontSize:14,marginBottom:4}}>HUNT ENGINE</div>
            <div style={{color:TEXT_D,fontSize:12,marginBottom:16}}>
              Scans all HGI verticals simultaneously — Disaster Recovery, TPA/Claims, Property Tax Appeals, Workforce, Health, Infrastructure, Federal. 
              Generates a ranked, scored opportunity list with immediate action flags.
            </div>

            {/* Vertical toggles */}
            <div style={{marginBottom:12}}>
              <div style={{fontSize:11,color:TEXT_D,fontWeight:700,letterSpacing:"0.08em",marginBottom:8}}>ACTIVE VERTICALS</div>
              <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                {VERTICALS.map(v=>(
                  <button key={v.id} onClick={()=>{
                    const cur = huntConfig.verticals;
                    const next = cur.includes(v.id) ? cur.filter(x=>x!==v.id) : [...cur,v.id];
                    const nc = {...huntConfig, verticals:next}; setHuntConfig(nc); store.set("huntConfig",nc);
                  }} style={{padding:"5px 12px",borderRadius:20,fontSize:11,cursor:"pointer",fontFamily:"inherit",fontWeight:600,border:"none",
                    background:huntConfig.verticals.includes(v.id)?GOLD+"33":BG3,
                    color:huntConfig.verticals.includes(v.id)?GOLD:TEXT_D,
                    outline:huntConfig.verticals.includes(v.id)?`1px solid ${GOLD}55`:"none"}}>
                    {v.icon} {v.label}
                  </button>
                ))}
              </div>
            </div>

            {/* State toggles */}
            <div style={{marginBottom:16}}>
              <div style={{fontSize:11,color:TEXT_D,fontWeight:700,letterSpacing:"0.08em",marginBottom:8}}>PRIORITY STATES</div>
              <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                {["LA","TX","FL","MS","AL","GA","Federal"].map(s=>(
                  <button key={s} onClick={()=>{
                    const cur = huntConfig.states;
                    const next = cur.includes(s) ? cur.filter(x=>x!==s) : [...cur,s];
                    const nc = {...huntConfig, states:next}; setHuntConfig(nc); store.set("huntConfig",nc);
                  }} style={{padding:"5px 14px",borderRadius:20,fontSize:12,cursor:"pointer",fontFamily:"inherit",fontWeight:700,border:"none",
                    background:huntConfig.states.includes(s)?GOLD+"33":BG3,
                    color:huntConfig.states.includes(s)?GOLD:TEXT_D,
                    outline:huntConfig.states.includes(s)?`1px solid ${GOLD}55`:"none"}}>
                    {s}
                  </button>
                ))}
              </div>
            </div>

            <div style={{display:"flex",gap:10,alignItems:"center",flexWrap:"wrap"}}>
              <Btn onClick={triggerHunt} disabled={hunting} style={{minWidth:180}}>
                {hunting ? "⟳ Hunting..." : "? Run Full Hunt Now"}
              </Btn>
              <Btn variant="ghost" onClick={()=>loadOpportunities()} disabled={hunting}>
                ⟳ Refresh from Database
              </Btn>
              {hunting && <div style={{color:TEXT_D,fontSize:12,animation:"pulse 1.5s infinite"}}>
                Scanning SAM.gov · LaPAC · Analyzing with AI · Scoring against HGI profile...
              </div>}
            </div>
            <div style={{marginTop:10,padding:"8px 12px",background:BG3,borderRadius:4,fontSize:11,color:TEXT_D}}>
              ? Hunt runs automatically every morning at 7am. Results are fully analyzed and scored before you see them — real RFP data, real documents, real OPI scores based on actual opportunity requirements vs HGI capabilities. Click <strong style={{color:GOLD}}>Refresh from Database</strong> to load latest results, or <strong style={{color:GOLD}}>Run Full Hunt Now</strong> to trigger an immediate scan.
            </div>
          </Card>

          {/* Quick preview of top results */}
          {huntResults.length > 0 && (
            <div>
              <div style={{color:GOLD_D,fontSize:11,fontWeight:700,letterSpacing:"0.1em",marginBottom:10}}>
                TOP OPPORTUNITIES — {huntResults.filter(o=>o.urgency==="IMMEDIATE").length} IMMEDIATE ACTION REQUIRED
              </div>
              {huntResults.filter(o=>o.urgency==="IMMEDIATE"||o.strategicImportance==="TIER_1"||(o.opiScore||0)>=75).slice(0,5).map(opp=>(
                <Card key={opp.id} style={{marginBottom:10,border:`1px solid ${urgencyColor(opp.urgency)}44`,cursor:"pointer"}} onClick={()=>{setExpandedCard(opp.id);setActiveTab("results");}}>
                  <div style={{display:"flex",gap:10,alignItems:"flex-start",flexWrap:"wrap"}}>
                    <div style={{flex:1,minWidth:200}}>
                      <div style={{display:"flex",gap:6,alignItems:"center",marginBottom:4,flexWrap:"wrap"}}>
                        <Badge color={urgencyColor(opp.urgency)}>{opp.urgency}</Badge>
                        <Badge color={tierColor(opp.strategicImportance||"TIER_2")}>{opp.strategicImportance||"TIER_2"}</Badge>
                        <span style={{fontSize:11}}>{verticalIcon(opp.vertical)}</span>
                        {opp.recompete && <Badge color={BLUE}>RECOMPETE</Badge>}
                      </div>
                      <div style={{color:TEXT,fontWeight:700,fontSize:13,marginBottom:2}}>{opp.title}</div>
                      <div style={{color:TEXT_D,fontSize:11}}>{opp.agency} · {opp.state} · {opp.estimatedValue}</div>
                      <div style={{color:TEXT_D,fontSize:11,marginTop:2}}>{opp.timing}</div>
                      {opp.description && <div style={{color:TEXT_D,fontSize:11,marginTop:4,fontStyle:"italic"}}>{opp.description}</div>}
                    </div>
                    <div style={{textAlign:"right",flexShrink:0}}>
                      <div style={{fontSize:28,fontWeight:800,color:opiColor(opp.opiScore||0)}}>{opp.opiScore||"?"}</div>
                      <div style={{fontSize:9,color:TEXT_D,letterSpacing:"0.06em"}}>OPI SCORE</div>
                      <div style={{display:"flex",gap:6,marginTop:6,justifyContent:"flex-end",flexWrap:"wrap"}}>
                        <Btn small onClick={(e)=>{e.stopPropagation();sendToWorkflow(opp);}} disabled={sendingToWorkflow===opp.id}>
                          {sendingToWorkflow===opp.id?"Sending...":"→ Workflow"}
                        </Btn>
                        {opp.sourceUrl && (
                          <a href={opp.sourceUrl} target="_blank" rel="noopener noreferrer"
                            style={{padding:"4px 10px",borderRadius:4,fontSize:11,fontWeight:700,background:BLUE+"22",color:BLUE,border:`1px solid ${BLUE}44`,textDecoration:"none"}}
                            onClick={e=>e.stopPropagation()}>?</a>
                        )}
                        {!opp.savedToTracker && <Btn small variant="ghost" onClick={(e)=>{e.stopPropagation();saveToTracker(opp);}}>+ Track</Btn>}
                        {opp.savedToTracker && <Badge color={GREEN}>Tracked</Badge>}
                      </div>
                    </div>
                  </div>
                </Card>
              ))}
              <Btn variant="ghost" small onClick={()=>setActiveTab("results")}>View All {huntResults.length} Results →</Btn>
            </div>
          )}
        </div>
      )}

      {/* ── RESULTS ── */}
      {activeTab === "results" && (
        <div>
          {/* Filters */}
          <Card style={{marginBottom:14}}>
            <div style={{display:"flex",gap:10,alignItems:"center",flexWrap:"wrap"}}>
              <div>
                <Label text="VERTICAL" />
                <select value={filterVertical} onChange={e=>setFilterVertical(e.target.value)} style={{background:BG4,color:TEXT,border:`1px solid ${BORDER}`,borderRadius:3,fontSize:12,padding:"4px 8px",fontFamily:"inherit"}}>
                  <option value="all">All Verticals</option>
                  {VERTICALS.map(v=><option key={v.id} value={v.id}>{v.label}</option>)}
                </select>
              </div>
              <div>
                <Label text="STATE" />
                <select value={filterState} onChange={e=>setFilterState(e.target.value)} style={{background:BG4,color:TEXT,border:`1px solid ${BORDER}`,borderRadius:3,fontSize:12,padding:"4px 8px",fontFamily:"inherit"}}>
                  <option value="all">All States</option>
                  {["LA","TX","FL","MS","AL","GA","Federal"].map(s=><option key={s} value={s}>{s}</option>)}
                </select>
              </div>
              <div>
                <Label text="SORT BY" />
                <select value={sortBy} onChange={e=>setSortBy(e.target.value)} style={{background:BG4,color:TEXT,border:`1px solid ${BORDER}`,borderRadius:3,fontSize:12,padding:"4px 8px",fontFamily:"inherit"}}>
                  <option value="opi">OPI Score</option>
                  <option value="urgency">Urgency</option>
                  <option value="value">Contract Value</option>
                </select>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:6,marginTop:14}}>
                <input type="checkbox" checked={filterUrgent} onChange={e=>setFilterUrgent(e.target.checked)} id="urgentOnly" />
                <label htmlFor="urgentOnly" style={{fontSize:12,color:RED,cursor:"pointer"}}>Immediate Only</label>
              </div>
              <div style={{marginLeft:"auto",color:TEXT_D,fontSize:12,marginTop:14}}>{filtered.length} of {huntResults.length} shown</div>
            </div>
          </Card>

          {filtered.length === 0 && (
            <div style={{textAlign:"center",padding:40,color:TEXT_D}}>
              {huntResults.length === 0 ? "No results yet — go to Hunt Engine and click Hunt Now" : "No results match current filters"}
            </div>
          )}

          {filtered.map(opp => {
            const isExpanded = expandedCard === opp.id;
            return (
            <Card key={opp.id} style={{marginBottom:10,border:`1px solid ${isExpanded?GOLD:urgencyColor(opp.urgency)}33`,transition:"border 0.15s"}}>
              {/* Header row — always visible */}
              <div style={{display:"flex",gap:12,alignItems:"flex-start",flexWrap:"wrap",cursor:"pointer"}} onClick={()=>setExpandedCard(isExpanded?null:opp.id)}>
                <div style={{flex:1,minWidth:220}}>
                  <div style={{display:"flex",gap:6,alignItems:"center",marginBottom:6,flexWrap:"wrap"}}>
                    <Badge color={urgencyColor(opp.urgency)}>{opp.urgency||"WATCH"}</Badge>
                    <Badge color={tierColor(opp.strategicImportance||"TIER_2")}>{opp.strategicImportance||"TIER_2"}</Badge>
                    <span style={{fontSize:12}}>{verticalIcon(opp.vertical)}</span>
                    <span style={{fontSize:11,color:TEXT_D}}>{VERTICALS.find(v=>v.id===opp.vertical)?.label||opp.vertical}</span>
                    {opp.recompete && <Badge color={BLUE}>RECOMPETE</Badge>}
                  </div>
                  <div style={{color:TEXT,fontWeight:700,fontSize:14,marginBottom:3}}>{opp.title}</div>
                  <div style={{color:TEXT_D,fontSize:12,marginBottom:2}}>
                    <strong style={{color:TEXT}}>{opp.agency}</strong> · {opp.state} · <span style={{color:GOLD}}>{opp.estimatedValue}</span>
                  </div>
                  <div style={{color:TEXT_D,fontSize:11,marginBottom:4}}>{opp.timing}</div>
                  {opp.description && <div style={{color:TEXT_D,fontSize:12,fontStyle:"italic"}}>{opp.description}</div>}
                </div>
                <div style={{textAlign:"right",flexShrink:0}}>
                  <div style={{fontSize:32,fontWeight:800,color:opiColor(opp.opiScore||0),marginBottom:2}}>{opp.opiScore||"?"}</div>
                  <div style={{fontSize:9,color:TEXT_D,letterSpacing:"0.06em",marginBottom:6}}>OPI SCORE</div>
                  <div style={{color:TEXT_D,fontSize:11}}>{isExpanded?"▲ Collapse":"▼ Details"}</div>
                </div>
              </div>

              {/* Expanded detail panel */}
              {isExpanded && (
                <div style={{marginTop:14,paddingTop:14,borderTop:`1px solid ${BORDER}`}}>
                  {/* Scope of Work */}
                  {opp.scopeOfWork && (
                    <div style={{marginBottom:12}}>
                      <div style={{fontSize:11,color:GOLD,fontWeight:700,letterSpacing:"0.08em",marginBottom:6}}>SCOPE OF WORK</div>
                      {(Array.isArray(opp.scopeOfWork) ? opp.scopeOfWork : opp.scopeOfWork.split("\n").filter(Boolean)).map((s,i)=>(
                        <div key={i} style={{fontSize:12,color:TEXT_D,marginBottom:4,paddingLeft:12,borderLeft:`2px solid ${GOLD}44`}}>· {s.replace(/^[-•·]\s*/,"")}</div>
                      ))}
                    </div>
                  )}

                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>
                    {/* Why HGI Wins */}
                    {opp.whyHgiWins && (

function KnowledgeBase() {
  const [docs, setDocs] = useState([]);
  const [loading, setLoading] = useState(false);
  const [filter, setFilter] = useState("all");
  const [queue, setQueue] = useState([]);
  const [activeTab, setActiveTab] = useState("upload");
  const [gmailQuery, setGmailQuery] = useState("");
  const [gmailResults, setGmailResults] = useState([]);
  const [gmailLoading, setGmailLoading] = useState(false);
  const [gmailStatus, setGmailStatus] = useState("");
  const [dragOver, setDragOver] = useState(false);
  const [expandedDoc, setExpandedDoc] = useState(null);
  const uploadingRef = useRef(false);

  const INTAKE_SECRET = "hgi-intake-2026-secure";
  const API_BASE = window.location.origin;

  const loadDocs = async () => {
    setLoading(true);
    try {
      const r = await fetch(API_BASE + "/api/knowledge?limit=100", {
        headers: { "x-intake-secret": INTAKE_SECRET }
      });
      if (r.ok) {
        const d = await r.json();
        setDocs(d.documents || []);
      }
    } catch(e) {}
    setLoading(false);
  };

  useEffect(() => { loadDocs(); }, []);

  const addFilesToQueue = (files) => {
    const newItems = Array.from(files).map(f => ({
      id: Date.now() + Math.random(),
      file: f,
      status: "pending",
      result: null,
      error: null,
    }));
    setQueue(prev => [...prev, ...newItems]);
  };

  const removeFromQueue = (id) => setQueue(prev => prev.filter(q => q.id !== id));

  const uploadOne = async (item) => {
    return new Promise((resolve) => {
      const reader = new FileReader();
      reader.onload = async (ev) => {
        const base64 = ev.target.result.split(",")[1];
        const ext = item.file.name.split(".").pop().toLowerCase();
        try {
          const r = await fetch(API_BASE + "/api/knowledge", {
            method: "POST",
            headers: { "Content-Type": "application/json", "x-intake-secret": INTAKE_SECRET },
            body: JSON.stringify({ filename: item.file.name, file_type: ext, content_base64: base64 })
          });
          const d = await r.json();
          if (d.success) {
            resolve({ success: true, result: d });
          } else {
            resolve({ success: false, error: d.error || "Unknown error" });
          }
        } catch(err) {
          resolve({ success: false, error: err.message });
        }
      };
      reader.readAsDataURL(item.file);
    });
  };

  const uploadAll = async () => {
    if (uploadingRef.current) return;
    uploadingRef.current = true;
    const pending = queue.filter(q => q.status === "pending");
    for (const item of pending) {
      setQueue(prev => prev.map(q => q.id === item.id ? {...q, status:"uploading"} : q));
      const res = await uploadOne(item);
      setQueue(prev => prev.map(q => q.id === item.id ? {
        ...q,
        status: res.success ? "done" : "error",
        result: res.result || null,
        error: res.error || null,
      } : q));
    }
    uploadingRef.current = false;
    loadDocs();
  };

  const deleteDoc = async (id, filename) => {
    if (!confirm("Delete " + filename + "?")) return;
    try {
      await fetch(API_BASE + "/api/knowledge?id=" + encodeURIComponent(id), {
        method: "DELETE", headers: { "x-intake-secret": INTAKE_SECRET }
      });
      loadDocs();
    } catch(e) {}
  };

  // Gmail search via Claude AI
  const searchGmail = async () => {
    if (!gmailQuery.trim()) return;
    setGmailLoading(true);
    setGmailStatus("Searching Gmail...");
    setGmailResults([]);
    try {
      const r = await fetch(API_BASE + "/api/claude", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 2000,
          system: "You are helping search Gmail for HGI proposal documents. Use the Gmail MCP tool to search for emails and attachments matching the query. Return results as JSON array: [{subject, from, date, hasAttachments, attachmentNames, snippet, messageId}]",
          messages: [{ role: "user", content: "Search Gmail for: " + gmailQuery + ". Focus on finding emails with PDF or Word document attachments related to HGI proposals, past performance, RFPs, or corporate documents. Return JSON only." }],
          mcp_servers: [{ type: "url", url: "https://gmail.mcp.claude.com/mcp", name: "gmail-mcp" }]
        })
      });
      const d = await r.json();
      const text = d.content?.filter(b => b.type === "text").map(b => b.text).join("") || "";
      try {
        const clean = text.replace(/```json|```/g,"").trim();
        const start = clean.indexOf("[");
        const end = clean.lastIndexOf("]");
        if (start > -1 && end > -1) {
          const results = JSON.parse(clean.slice(start, end+1));
          setGmailResults(results);
          setGmailStatus(results.length + " emails found");
        } else {
          setGmailStatus("Search complete — " + text.slice(0,200));
        }
      } catch(e) {
        setGmailStatus("Search complete: " + text.slice(0,300));
      }
    } catch(e) {
      setGmailStatus("Search failed: " + e.message);
    }
    setGmailLoading(false);
  };

  const formatSize = (bytes) => {
    if (!bytes) return "";
    if (bytes < 1024) return bytes + "B";
    if (bytes < 1024*1024) return (bytes/1024).toFixed(0) + "KB";
    return (bytes/(1024*1024)).toFixed(1) + "MB";
  };

  const statusColor = (s) => s==="done"?GREEN:s==="error"?RED:s==="uploading"?GOLD:TEXT_D;
  const statusLabel = (s) => ({pending:"Ready",uploading:"Uploading...",done:"Done",error:"Failed"}[s]||s);

  const verticals = ["all","disaster","tpa","appeals","workforce","health","infrastructure","federal","construction","general"];
  const filtered = filter === "all" ? docs : docs.filter(d => d.vertical === filter);
  const pendingCount = queue.filter(q=>q.status==="pending").length;
  const doneCount = queue.filter(q=>q.status==="done").length;

  const GMAIL_PRESETS = [
    "HGI proposal attachments PDF",
    "Road Home Restore Louisiana proposal",
    "FEMA Public Assistance RFP response",
    "past performance capabilities statement",
    "staff bios resumes HGI",
    "TPCIGA LIGA workers compensation proposal",
  ];

  return (
    <div style={{padding:"0 0 40px"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16,flexWrap:"wrap",gap:8}}>
        <div>
          <h2 style={{color:GOLD,margin:"0 0 4px",fontSize:20,fontWeight:800}}>Knowledge Base</h2>
          <p style={{color:TEXT_D,margin:0,fontSize:12}}>{docs.length} document{docs.length!==1?"s":""} indexed — Claude injects relevant doctrine into every analysis automatically</p>
        </div>
        <Btn small onClick={loadDocs}>Refresh</Btn>
      </div>

      {/* Tabs */}
      <div style={{display:"flex",gap:4,marginBottom:16,borderBottom:`1px solid ${BORDER}`,paddingBottom:8}}>
        {[["upload","Upload Documents"],["gmail","Search Gmail"],["library","Document Library (" + docs.length + ")"]].map(([v,l])=>(
          <button key={v} onClick={()=>setActiveTab(v)} style={{
            padding:"6px 14px",fontSize:11,cursor:"pointer",fontFamily:"inherit",
            background:activeTab===v?GOLD:"transparent",
            color:activeTab===v?"#000":TEXT_D,
            border:`1px solid ${activeTab===v?GOLD:BORDER}`,
            borderRadius:4,fontWeight:activeTab===v?700:400
          }}>{l}</button>
        ))}
      </div>

      {/* ── UPLOAD TAB ── */}
      {activeTab === "upload" && (
        <div>
          {/* Size warning */}
          <div style={{padding:"10px 14px",background:ORANGE+"15",border:`1px solid ${ORANGE}33`,borderRadius:4,marginBottom:16,fontSize:12,color:ORANGE}}>
            <strong>Size limit: 50 pages per file.</strong> Documents larger than 50 pages must be split before uploading. Uploading a 500-page document as one file will fail.
          </div>

          {/* Drop zone */}
          <div
            onDragOver={e=>{e.preventDefault();setDragOver(true);}}
            onDragLeave={()=>setDragOver(false)}
            onDrop={e=>{e.preventDefault();setDragOver(false);addFilesToQueue(e.dataTransfer.files);}}
            style={{
              background:dragOver?GOLD+"11":BG2,
              border:"2px dashed " + (dragOver?GOLD:BORDER),
              borderRadius:8,padding:"32px 20px",textAlign:"center",marginBottom:16,
              transition:"all 0.2s",cursor:"pointer",position:"relative"
            }}>
            <input type="file" accept=".pdf,.docx,.txt,.md" multiple style={{position:"absolute",inset:0,opacity:0,cursor:"pointer",width:"100%",height:"100%"}}
              onChange={e=>{if(e.target.files.length)addFilesToQueue(e.target.files);}} />
            <div style={{color:TEXT,fontWeight:600,fontSize:15,marginBottom:6}}>Drop files here or click to browse</div>
            <div style={{color:TEXT_D,fontSize:11,marginBottom:4}}>PDF, DOCX, or TXT — multiple files supported</div>
            <div style={{color:TEXT_D,fontSize:11}}>Claude extracts past performance, win themes, staffing patterns, and doctrine from every document</div>
          </div>

          {/* Queue */}
          {queue.length > 0 && (
            <div style={{marginBottom:16}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
                <span style={{fontSize:12,color:TEXT_D}}>{queue.length} file{queue.length!==1?"s":""} queued{doneCount>0?" · "+doneCount+" done":""}</span>
                <div style={{display:"flex",gap:8}}>
                  {pendingCount > 0 && <Btn small onClick={uploadAll}>Upload {pendingCount} File{pendingCount!==1?"s":""}</Btn>}
                  <Btn small variant="ghost" onClick={()=>setQueue([])}>Clear Queue</Btn>
                </div>
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:4}}>
                {queue.map(item => (
                  <div key={item.id} style={{
                    display:"flex",alignItems:"center",gap:10,padding:"10px 12px",
                    background:item.status==="done"?GREEN+"11":item.status==="error"?RED+"11":item.status==="uploading"?GOLD+"11":BG2,
                    border:`1px solid ${item.status==="done"?GREEN:item.status==="error"?RED:item.status==="uploading"?GOLD:BORDER}`,
                    borderRadius:4,fontSize:12,transition:"all 0.3s"
                  }}>
                    <span style={{flex:1,color:TEXT,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{item.file.name}</span>
                    <span style={{color:TEXT_D,fontSize:10,flexShrink:0}}>{formatSize(item.file.size)}</span>
                    <span style={{color:statusColor(item.status),fontSize:11,fontWeight:700,flexShrink:0,minWidth:80,textAlign:"right"}}>
                      {item.status==="uploading"?<span style={{animation:"pulse 1s infinite",display:"inline-block"}}>{statusLabel(item.status)}</span>:statusLabel(item.status)}
                    </span>
                    {item.result && <span style={{fontSize:10,color:TEXT_D,flexShrink:0}}>{item.result.document_class?.replace(/_/g," ")} · {item.result.vertical}</span>}
                    {item.error && <span style={{fontSize:10,color:RED,flexShrink:0,maxWidth:150,overflow:"hidden",textOverflow:"ellipsis"}}>{item.error}</span>}
                    {item.status==="pending" && <button onClick={()=>removeFromQueue(item.id)} style={{background:"none",border:"none",color:TEXT_D,cursor:"pointer",fontSize:14,padding:"0 2px",flexShrink:0}}>✕</button>}
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
      )}

      {/* ── GMAIL TAB ── */}
      {activeTab === "gmail" && (
        <div>
          <div style={{padding:"12px 16px",background:BG2,border:`1px solid ${BORDER}`,borderRadius:4,marginBottom:16,fontSize:12,color:TEXT_D,lineHeight:1.6}}>
            Search your Gmail for HGI proposal documents, past performance files, RFPs, and attachments. Results will show emails with attachments you can then download and upload to the knowledge base.
          </div>

          <div style={{marginBottom:12}}>
            <Label text="SEARCH QUERY" />
            <div style={{display:"flex",gap:8,marginTop:6}}>
              <Input value={gmailQuery} onChange={setGmailQuery} placeholder="e.g. Road Home proposal PDF" style={{flex:1}} />
              <Btn onClick={searchGmail} disabled={gmailLoading}>{gmailLoading?"Searching...":"Search Gmail"}</Btn>
            </div>
          </div>

          <div style={{marginBottom:16}}>
            <div style={{fontSize:10,color:TEXT_D,letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:8}}>Quick Searches</div>
            <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
              {GMAIL_PRESETS.map(p => (
                <button key={p} onClick={()=>{setGmailQuery(p);}} style={{
                  padding:"4px 10px",fontSize:11,cursor:"pointer",fontFamily:"inherit",
                  background:"transparent",color:TEXT_D,border:`1px solid ${BORDER}`,borderRadius:3,
                  transition:"all 0.15s"
                }}>{p}</button>
              ))}
            </div>
          </div>

          {gmailStatus && (
            <div style={{padding:"8px 12px",background:BG2,border:`1px solid ${BORDER}`,borderRadius:4,fontSize:11,color:TEXT_D,marginBottom:12}}>
              {gmailStatus}
            </div>
          )}

          {gmailResults.length > 0 && (
            <div style={{display:"flex",flexDirection:"column",gap:6}}>
              {gmailResults.map((r,i) => (
                <div key={i} style={{padding:"12px 14px",background:BG2,border:`1px solid ${BORDER}`,borderRadius:4}}>
                  <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:10}}>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{color:TEXT,fontWeight:600,fontSize:12,marginBottom:2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.subject || "(no subject)"}</div>
                      <div style={{color:TEXT_D,fontSize:11,marginBottom:4}}>{r.from} · {r.date}</div>
                      {r.snippet && <div style={{color:TEXT_D,fontSize:11,fontStyle:"italic",marginBottom:4}}>{r.snippet}</div>}
                      {r.attachmentNames?.length > 0 && (
                        <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                          {r.attachmentNames.map((name,j) => (
                            <span key={j} style={{fontSize:10,color:GOLD,background:GOLD+"15",padding:"2px 8px",borderRadius:3}}>{name}</span>
                          ))}
                        </div>
                      )}
                    </div>
                    {r.hasAttachments && (
                      <Badge color={GREEN}>Has Attachments</Badge>
                    )}
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      )}

      {/* ── LIBRARY TAB ── */}
      {activeTab === "library" && (
        <div>
          <div style={{display:"flex",gap:6,marginBottom:16,flexWrap:"wrap"}}>
            {verticals.map(v => (
              <button key={v} onClick={()=>setFilter(v)} style={{
                background:filter===v?GOLD:BG2, color:filter===v?"#000":TEXT_D,
                border:"1px solid " + (filter===v?GOLD:BORDER), borderRadius:4,
                padding:"4px 10px", fontSize:11, cursor:"pointer", fontWeight:filter===v?700:400
              }}>{v}{v==="all"?" ("+docs.length+")":""}</button>
            ))}
          </div>

          {loading ? (
            <div style={{color:TEXT_D,fontSize:13,padding:20,textAlign:"center"}}>Loading...</div>
          ) : filtered.length === 0 ? (
            <div style={{background:BG2,border:"1px solid "+BORDER,borderRadius:8,padding:"32px 20px",textAlign:"center"}}>
              <div style={{color:TEXT_D,fontSize:13,marginBottom:6}}>No documents yet</div>
              <div style={{color:TEXT_D,fontSize:11}}>Upload documents in the Upload tab to seed the knowledge base</div>
            </div>
          ) : (
            <div style={{display:"flex",flexDirection:"column",gap:6}}>
              {filtered.map(doc => (
                <div key={doc.id} style={{background:BG2,border:"1px solid "+BORDER,borderRadius:6}}>
                  <div style={{padding:"12px 14px",display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:10,cursor:"pointer"}}
                    onClick={()=>setExpandedDoc(expandedDoc===doc.id?null:doc.id)}>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4,flexWrap:"wrap"}}>
                        <span style={{color:TEXT,fontWeight:600,fontSize:13,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:300}}>{doc.filename}</span>
                        <span style={{background:GOLD,color:"#000",fontSize:9,fontWeight:700,padding:"2px 7px",borderRadius:10,flexShrink:0}}>
                          {(doc.vertical||"general").toUpperCase()}
                        </span>
                        <span style={{color:TEXT_D,fontSize:10,border:"1px solid "+BORDER,padding:"2px 6px",borderRadius:4,flexShrink:0}}>
                          {(doc.document_class||"other").replace(/_/g," ")}
                        </span>
                        {doc.chunk_count > 0 && <span style={{color:TEXT_D,fontSize:10,flexShrink:0}}>{doc.chunk_count} chunks</span>}
                      </div>
                      {doc.summary && <div style={{color:TEXT_D,fontSize:11,lineHeight:1.5}}>{doc.summary}</div>}
                    </div>
                    <div style={{display:"flex",gap:6,alignItems:"center",flexShrink:0}}>
                      <span style={{fontSize:10,color:TEXT_D}}>{expandedDoc===doc.id?"▲":"▼"}</span>
                      <button onClick={e=>{e.stopPropagation();deleteDoc(doc.id,doc.filename);}} style={{
                        background:"transparent",border:"1px solid "+BORDER,color:TEXT_D,
                        borderRadius:4,padding:"3px 8px",fontSize:11,cursor:"pointer"
                      }}>Delete</button>
                    </div>
                  </div>
                  {expandedDoc===doc.id && doc.doctrine && (
                    <div style={{padding:"0 14px 12px",borderTop:`1px solid ${BORDER}`}}>
                      {doc.doctrine.win_themes?.length > 0 && (
                        <div style={{marginTop:10}}>
                          <div style={{fontSize:10,color:GOLD,letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:6}}>Win Themes Extracted</div>
                          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                            {doc.doctrine.win_themes.map((t,i)=>(
                              <span key={i} style={{fontSize:11,color:TEXT_D,background:BG3,padding:"3px 8px",borderRadius:3,border:`1px solid ${BORDER}`}}>{t}</span>
                            ))}
                          </div>
                        </div>
                      )}
                      {doc.doctrine.service_lines?.length > 0 && (
                        <div style={{marginTop:10}}>
                          <div style={{fontSize:10,color:TEXT_D,letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:6}}>Service Lines</div>
                          <div style={{color:TEXT_D,fontSize:11}}>{doc.doctrine.service_lines.join(" · ")}</div>
                        </div>
                      )}
                      {doc.doctrine.narrative_summary && (
                        <div style={{marginTop:10,padding:"8px 10px",background:BG3,borderRadius:4,fontSize:11,color:TEXT_D,lineHeight:1.6}}>
                          {doc.doctrine.narrative_summary}
                        </div>
                      )}
                    </div>
                  )}
                </div>
              ))}
            </div>
          )}
        </div>
      )}
    </div>
  );
}


function App() {
  const [active, setActive] = useState("dashboard");
  const [sideOpen, setSideOpen] = useState(true);
  const [sharedCtx, setSharedCtx] = useState(() => store.get("sharedCtx") || {rfpText:"", decomposition:"", execBrief:"", title:"", agency:""});
  const [proposalSection, setProposalSection] = useState("executive_summary");

  const saveSharedCtx = (ctx) => {
    const merged = {...sharedCtx, ...ctx};
    setSharedCtx(merged);
    store.set("sharedCtx", merged);
  };

  const goToProposal = (section) => {
    setProposalSection(section);
    setActive("proposal");
  };

  const tracker = store.get("tracker") || [];
  const t1 = tracker.filter(o => o.opiScore && parseInt(o.opiScore) >= 70).length;

  const components = {
    dashboard: <Dashboard setActive={setActive} />,
    workflow: <FullWorkflow sharedCtx={sharedCtx} saveSharedCtx={saveSharedCtx} goToProposal={goToProposal} />,
    discovery: <OpportunityDiscovery saveSharedCtx={saveSharedCtx} goToWorkflow={()=>setActive("workflow")} />,
    scanner: <PipelineScanner />,
    tracker: <PipelineTracker goToWorkflow={() => setActive("workflow")} />,
    scoring: <WinnabilityScoring />,
    research: <ResearchAnalysis sharedCtx={sharedCtx} saveSharedCtx={saveSharedCtx} />,
    proposal: <ProposalEngine sharedCtx={sharedCtx} defaultSection={proposalSection} />,
    financial: <FinancialPricing sharedCtx={sharedCtx} />,
    recruiting: <RecruitingBench sharedCtx={sharedCtx} />,
    digest: <WeeklyDigest />,
    knowledge: <KnowledgeBase />,
  };

  return (
    <div style={{display:"flex",height:"100vh",overflow:"hidden"}}>
      <div style={{width:sideOpen?260:60,background:BG2,borderRight:`1px solid ${BORDER}`,display:"flex",flexDirection:"column",transition:"width 0.2s",overflow:"hidden",flexShrink:0}}>
        <div style={{padding:"20px 16px",borderBottom:`1px solid ${BORDER}`}}>
          {sideOpen ? (
            <div>
              <div style={{color:GOLD,fontWeight:800,fontSize:18,letterSpacing:"0.05em"}}>HGI</div>
              <div style={{color:GOLD_D,fontSize:10,letterSpacing:"0.15em",marginTop:2}}>AI CAPTURE SYSTEM v1.1</div>
              <div style={{color:TEXT_D,fontSize:11,marginTop:4}}>Hammerman & Gainer LLC · 95 Years</div>
              {t1 > 0 && <div style={{marginTop:8}}><Badge color={GREEN}>{t1} Tier 1 Opp{t1>1?"s":""}</Badge></div>}
            </div>
          ) : (
            <div style={{color:GOLD,fontWeight:800,fontSize:16,textAlign:"center"}}>H</div>
          )}
        </div>
        <nav style={{flex:1,overflowY:"auto",padding:"12px 8px"}}>
          {MODULES.map(m => {
            const isActive = active === m.id;
            return (
              <button key={m.id} onClick={()=>setActive(m.id)}
                style={{width:"100%",display:"flex",alignItems:"center",gap:10,padding:"10px 10px",borderRadius:4,
                  cursor:"pointer",border:"none",fontFamily:"inherit",marginBottom:2,
                  background:isActive?GOLD+"22":"transparent",
                  borderLeft:isActive?`3px solid ${GOLD}`:"3px solid transparent",
                  color:isActive?GOLD:TEXT_D,fontSize:13,textAlign:"left"}}>
                <span style={{fontSize:16,flexShrink:0}}>{m.icon}</span>
                {sideOpen && <span style={{fontWeight:isActive?700:400,flex:1}}>{m.label}</span>}
                {sideOpen && m.badge && <Badge color={GREEN}>{m.badge}</Badge>}
              </button>
            );
          })}
        </nav>
        {sideOpen && (
          <div style={{padding:"12px 16px",borderTop:`1px solid ${BORDER}`,fontSize:10,color:TEXT_D}}>
            <div style={{fontWeight:700,color:GOLD_D,marginBottom:6,letterSpacing:"0.08em"}}>KEY PAST PERFORMANCE</div>
            {["Road Home $12B CDBG-DR","BP GCCF 1M+ claims","PBGC 34M beneficiaries","TPCIGA 20yrs Texas","Restore Louisiana","Terrebonne Parish / Ida"].map(p => (
              <div key={p} style={{marginBottom:3}}>· {p}</div>
            ))}
          </div>
        )}
      </div>
      <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
        <div style={{padding:"14px 20px",borderBottom:`1px solid ${BORDER}`,display:"flex",alignItems:"center",gap:12,background:BG2}}>
          <button onClick={()=>setSideOpen(s=>!s)} style={{background:"none",border:"none",color:TEXT_D,cursor:"pointer",fontSize:16,padding:4}}>☰</button>
          <span style={{color:GOLD,fontWeight:700,fontSize:14}}>{MODULES.find(m=>m.id===active)?.label}</span>
        </div>
        <div style={{flex:1,overflowY:"auto",padding:24}}>
          {components[active]}
        </div>
      </div>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById("root"));
</script>
</body>
</html>
