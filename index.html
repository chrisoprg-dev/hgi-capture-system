<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HGI AI Capture System v1.1</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    body { background: #0A0A0A; color: #E8E0D0; font-family: Georgia, serif; margin: 0; }
    * { box-sizing: border-box; }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-thumb { background: #8B6E2E; }
    textarea::placeholder, input::placeholder { color: #555048; }
    select option { background: #191919; }
    @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.4} }
    @keyframes spin { from{transform:rotate(0deg)}to{transform:rotate(360deg)} }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;
const GOLD="#C9A84C",GOLD_D="#8B6E2E",BG="#0A0A0A",BG2="#111111",BG3="#191919",BG4="#222222";
const TEXT="#E8E0D0",TEXT_D="#888070",BORDER="#2A2520",RED="#C0392B",GREEN="#27AE60",BLUE="#2980B9",ORANGE="#E67E22";

const HGI_CONTEXT = "Hammerman & Gainer LLC (HGI) — 95 years. Disaster Recovery, CDBG-DR, TPA/Claims, Housing, Construction Management. Past performance: Road Home $12B, BP GCCF 1M+ claims, PBGC 34M beneficiaries, TPCIGA 20yrs Texas, Restore Louisiana, Terrebonne Parish, Jefferson Parish FEMA PA. Geography: Louisiana, Gulf Coast, Texas.";

const store = {
  get(k){try{const v=localStorage.getItem('hgi_'+k);return v?JSON.parse(v):null}catch{return null}},
  set(k,v){try{localStorage.setItem('hgi_'+k,JSON.stringify(v))}catch{}}
};

async function callClaude(prompt, system, maxTokens=3000) {
  try {
    const body = {
      model: "claude-sonnet-4-20250514",
      max_tokens: maxTokens,
      system: system || "You are an expert government contracting capture manager for HGI. " + HGI_CONTEXT,
      messages: [{ role: "user", content: prompt }]
    };
    const r = await fetch("/api/claude", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body)
    });
    if (!r.ok) {
      const errText = await r.text();
      console.error("API error:", r.status, errText);
      return "API error " + r.status + ": " + errText;
    }
    const d = await r.json();
    if (!d.content) return "No content returned: " + JSON.stringify(d);
    return d.content.filter(b => b.type === "text").map(b => b.text).join("") || "No response.";
  } catch(err) {
    console.error("callClaude error:", err);
    return "Error: " + err.message;
  }
}

const Badge = ({children, color=GOLD}) => (
  <span style={{display:"inline-block",padding:"2px 8px",borderRadius:3,fontSize:10,fontWeight:700,
    letterSpacing:"0.08em",background:color+"22",color,border:`1px solid ${color}44`,textTransform:"uppercase"}}>
    {children}
  </span>
);
const Card = ({children, style}) => (
  <div style={{background:BG2,border:`1px solid ${BORDER}`,borderRadius:6,padding:16,...style}}>{children}</div>
);
const Btn = ({children, onClick, variant="primary", disabled, small, style}) => {
  const base = {cursor:disabled?"not-allowed":"pointer",border:"none",borderRadius:4,fontFamily:"inherit",
    fontWeight:600,letterSpacing:"0.05em",padding:small?"5px 12px":"9px 18px",fontSize:small?12:13,opacity:disabled?0.5:1,...style};
  const v = {
    primary:{background:GOLD,color:BG},
    secondary:{background:BG4,color:TEXT,border:`1px solid ${BORDER}`},
    danger:{background:RED+"22",color:RED,border:`1px solid ${RED}44`},
    ghost:{background:"transparent",color:GOLD,border:`1px solid ${GOLD}44`}
  };
  return <button style={{...base,...v[variant]}} onClick={disabled?undefined:onClick}>{children}</button>;
};
const Input = ({value, onChange, placeholder, style}) => (
  <input value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder}
    style={{background:BG3,border:`1px solid ${BORDER}`,borderRadius:4,color:TEXT,fontFamily:"inherit",
      fontSize:13,padding:"8px 10px",outline:"none",width:"100%",...style}} />
);
const Textarea = ({value, onChange, placeholder, rows=4, style}) => (
  <textarea value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} rows={rows}
    style={{width:"100%",background:BG3,border:`1px solid ${BORDER}`,borderRadius:4,color:TEXT,
      fontFamily:"inherit",fontSize:13,padding:10,resize:"vertical",outline:"none",lineHeight:1.6,...style}} />
);
const Sel = ({value, onChange, options, style}) => (
  <select value={value} onChange={e=>onChange(e.target.value)}
    style={{background:BG3,border:`1px solid ${BORDER}`,borderRadius:4,color:TEXT,fontFamily:"inherit",fontSize:13,padding:"8px 10px",outline:"none",...style}}>
    {options.map(o => <option key={o.value} value={o.value}>{o.label}</option>)}
  </select>
);
const Label = ({text}) => <label style={{display:"block",fontSize:11,color:TEXT_D,marginBottom:4,letterSpacing:"0.06em"}}>{text}</label>;
const AIOut = ({content, loading, label="AI ANALYSIS"}) => {
  if (loading) return <div style={{color:GOLD,fontSize:13,padding:12,background:BG3,borderRadius:4,border:`1px solid ${GOLD}33`,animation:"pulse 1.2s infinite"}}>
    ⟳ generating {label}...</div>;
  if (!content) return null;
  return <div style={{background:BG3,border:`1px solid ${GOLD}33`,borderRadius:4,padding:14,fontSize:13,lineHeight:1.75,color:TEXT,whiteSpace:"pre-wrap"}}>
    <div style={{color:GOLD,fontSize:11,fontWeight:700,letterSpacing:"0.1em",marginBottom:8}}>{label}</div>
    {content}
  </div>;
};
const OPIBadge = ({score}) => {
  if (!score && score !== 0) return null;
  const n = parseInt(score);
  const color = n>=70?GREEN:n>=45?GOLD:RED;
  const tier = n>=70?"Tier 1":n>=45?"Tier 2":n>=25?"Tier 3":"Archive";
  return <span style={{background:color+"22",border:`1px solid ${color}44`,borderRadius:4,padding:"4px 10px",color,fontWeight:700}}>
    OPI {n} — {tier}
  </span>;
};

// ── FULL WORKFLOW ─────────────────────────────────────────────────────────────
function FullWorkflow({ sharedCtx={}, saveSharedCtx=()=>{}, goToProposal=()=>{} }) {
  const wfStore = store.get("wfState") || {};
  const [title, setTitle] = useState(wfStore.title || "");
  const [agency, setAgency] = useState(wfStore.agency || "");
  const [rfpUrl, setRfpUrl] = useState(wfStore.rfpUrl || "");
  const [incumbent, setIncumbent] = useState(wfStore.incumbent || "");
  const [intel, setIntel] = useState(wfStore.intel || "");
  const [rfpText, setRfpText] = useState(wfStore.rfpText || "");
  const [fileName, setFileName] = useState(wfStore.fileName || "");
  const [fileLoading, setFileLoading] = useState(false);
  const [step, setStep] = useState(wfStore.step || 0);
  const [outA, setOutA] = useState(wfStore.outA || "");
  const [outB, setOutB] = useState(wfStore.outB || "");
  const [decision, setDecision] = useState(wfStore.decision || "");
  const [opi, setOpi] = useState(wfStore.opi || null);
  const [tab, setTab] = useState("a");
  const [loadingA, setLoadingA] = useState(false);
  const [loadingB, setLoadingB] = useState(false);
  const [elapsed, setElapsed] = useState(0);
  const timerRef = useRef(null);
  const [researchStatus, setResearchStatus] = useState("");
  const [error, setError] = useState("");

  const persistWF = (updates) => {
    store.set("wfState", {...(store.get("wfState")||{}), ...updates});
  };

  const startTimer = () => {
    setElapsed(0);
    if (timerRef.current) clearInterval(timerRef.current);
    timerRef.current = setInterval(() => setElapsed(e => e + 1), 1000);
  };
  const stopTimer = () => {
    if (timerRef.current) { clearInterval(timerRef.current); timerRef.current = null; }
  };

  useEffect(() => { return () => stopTimer(); }, []);

  const handleFileUpload = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    setFileName(file.name);
    setFileLoading(true);
    try {
      if (file.type === "text/plain") {
        const text = await file.text();
        setRfpText(text);
        setFileLoading(false);
        return;
      }
      const reader = new FileReader();
      reader.onload = async (ev) => {
        const base64 = ev.target.result.split(",")[1];
        const mediaType = file.type || "application/octet-stream";
        try {
          const body = {
            model: "claude-sonnet-4-20250514",
            max_tokens: 4000,
            system: "You are a document extraction assistant. Extract all text content from this document. Return only the extracted text, no commentary.",
            messages: [{
              role: "user",
              content: [
                { type: "document", source: { type: "base64", media_type: mediaType, data: base64 } },
                { type: "text", text: "Extract all text from this document. Return the full text content only." }
              ]
            }]
          };
          const r = await fetch("/api/claude", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body) });
          const d = await r.json();
          const extracted = d.content ? d.content.filter(b => b.type === "text").map(b => b.text).join("") : "";
          setRfpText(extracted || "Could not extract text from file. Please paste manually.");
        } catch(err) {
          setRfpText("Error extracting file. Please paste the RFP text manually.");
        }
        setFileLoading(false);
      };
      reader.readAsDataURL(file);
    } catch(err) {
      setRfpText("Error reading file. Please paste the RFP text manually.");
      setFileLoading(false);
    }
  };

  const extractDecision = (text) => {
    const t = text.toUpperCase();
    if (t.includes("CONDITIONAL GO")) return "CONDITIONAL GO";
    if (t.includes(": GO") || t.includes("RECOMMENDATION: GO")) return "GO";
    if (t.includes("NO-BID") || t.includes("NO BID")) return "NO-BID";
    if (t.includes("WATCHLIST")) return "WATCHLIST";
    return "";
  };
  const extractOPI = (text) => {
    const m = text.match(/OPI[^:]*:\s*(\d+)/i);
    return m ? parseInt(m[1]) : null;
  };

  const buildPromptA = (rfp) => {
    return "Analyze this RFP for HGI and produce a structured decomposition.\n\n" +
      "HEADER BLOCK:\nRFP Title:\nAgency:\nBuyer Type:\nService Archetype:\nFunding Tags:\nPeriod of Performance:\nKey Dates:\nPricing Type:\nKey Personnel Required:\nEstimated Value:\nGeography:\n\n" +
      "Then provide:\n1) SCOPE SNAPSHOT - 5-8 bullets\n2) DELIVERABLES & REQUIREMENTS\n3) EVALUATION CRITERIA - factor, weight, what evaluators want\n4) COMPLIANCE & PASS-FAIL requirements\n5) KEY PERSONNEL - roles, experience, certs\n6) PRICING REQUIREMENTS\n7) RISKS & GOTCHAS\n\nMark anything missing as: Not Found in Provided Text\n\nRFP TEXT:\n" + rfp;
  };

  const buildPromptB = (decomp, ctx) => {
    return "Produce a leadership decision brief for HGI.\n\n" +
      "HEADER BLOCK:\nOpportunity:\nDecision Recommendation: (GO / CONDITIONAL GO / NO-BID / WATCHLIST)\nPwin (0-100):\nOPI Score (0-100):\nPriority Tier: (Tier 1/2/3/Archive)\nRevenue Timing:\nStaffing Status: (Green/Yellow/Red)\nPricing Posture:\nEffort Level:\n\n" +
      "Then provide:\n1) WHAT THIS IS - 5-8 bullets\n2) WHY HGI WINS - 6-8 bullets tied to eval criteria\n3) WHY HGI LOSES - 6-8 bullets on risks\n4) OPI + PWIN BREAKDOWN with sub-scores\n5) PRICING STRATEGY\n6) STAFFING FEASIBILITY\n7) 48-HOUR ACTION PLAN - 8 actions\n8) DECISION LOGIC - one paragraph\n\n" +
      "DECOMPOSITION:\n" + decomp + "\n\nCONTEXT:\n" + ctx;
  };

  const autoResearch = async (decomp, oppTitle, oppAgency) => {
    const agencyLine = decomp.split("\n").find(l => l.match(/^Agency:/i));
    const detectedAgency = oppAgency || (agencyLine ? agencyLine.replace(/^Agency:\s*/i,"").trim() : "");
    const typeLine = decomp.split("\n").find(l => l.match(/^Service Archetype:/i));
    const detectedType = typeLine ? typeLine.replace(/^Service Archetype:\s*/i,"").trim() : "disaster recovery program management";
    if (!detectedAgency || detectedAgency.includes("Not Found")) {
      setResearchStatus("(no agency detected — add agency name for auto-research)");
      return;
    }
    setResearchStatus("Researching " + detectedAgency + " in background...");
    try {
      const researchPrompt = "Deep competitive research for HGI capture:\nAgency: " + detectedAgency + "\nOpportunity Type: " + detectedType + "\nOpportunity: " + (oppTitle || "TBD") + "\n\nProvide concise intel on:\n1. Agency Profile\n2. Funding Landscape\n3. Competitive Intel\n4. Relationship Map\n5. Win Strategy — 5 specific recommendations\n6. Red Flags\n7. Intel Gaps";
      const r = await callClaude(researchPrompt, "You are a capture intelligence analyst for HGI. Be specific and actionable. " + HGI_CONTEXT);
      saveSharedCtx({ research: r, researchAgency: detectedAgency });
      setResearchStatus("Research complete: " + detectedAgency);
    } catch(e) {
      setResearchStatus("Research failed — run manually in Research & Analysis tab");
    }
  };

  const runA = async () => {
    if (!rfpText.trim() && !title.trim()) return;
    setError("");
    setLoadingA(true);
    setOutA(""); setOutB(""); setDecision(""); setOpi(null);
    startTimer();
    try {
      const rIn = rfpText || "Title: " + title + "\nAgency: " + agency + "\nContext: " + intel;
      const sys = "You are an expert capture manager for HGI (Hammerman & Gainer). " + HGI_CONTEXT + " Extract solicitation requirements precisely. Mark missing info as Not Found in Provided Text.";
      const a = await callClaude(buildPromptA(rIn), sys, 4000);
      stopTimer();
      setElapsed(0);
      setOutA(a);
      setLoadingA(false);
      setTab("a");
      persistWF({ outA: a, step: 2, title, agency, rfpText: rIn, rfpUrl, incumbent, intel });
      saveSharedCtx({ rfpText: rIn, decomposition: a, title, agency });
      // Fire background tasks — don't await
      autoResearch(a, title, agency);
    } catch(err) {
      stopTimer();
      setError("Step 1 failed: " + err.message);
      setLoadingA(false);
    }
  };

  const runB = async () => {
    setLoadingB(true);
    setError("");
    startTimer();
    try {
      const researchBlock = sharedCtx.research ? "\n\nCOMPETITIVE RESEARCH:\n" + sharedCtx.research.slice(0, 1200) : "";
      const ctx = "Title: " + title + "\nAgency: " + agency + "\nIncumbent: " + (incumbent || "Unknown") + "\nIntel: " + intel + "\nURL: " + rfpUrl + researchBlock;
      const sys = "You are a senior capture executive for HGI. Be analytical, decisive, specific. " + HGI_CONTEXT;
      const b = await callClaude(buildPromptB(outA, ctx), sys, 4000);
      stopTimer();
      setElapsed(0);
      const dec = extractDecision(b);
      const opiVal = extractOPI(b);
      setOutB(b);
      setDecision(dec);
      setOpi(opiVal);
      setLoadingB(false);
      setTab("b");
      persistWF({ outB: b, step: 3, decision: dec, opi: opiVal });
      saveSharedCtx({ execBrief: b });
    } catch(err) {
      stopTimer();
      setError("Step 2 failed: " + err.message);
      setLoadingB(false);
    }
  };

  const saveToTracker = () => {
    const tracker = store.get("tracker") || [];
    const extractField = (text, ...fields) => {
      for (const field of fields) {
        const lines = text.split("\n");
        for (const line of lines) {
          if (line.toLowerCase().startsWith(field.toLowerCase() + ":")) {
            const val = line.slice(field.length + 1).trim();
            if (val && !val.toLowerCase().includes("not found") && val !== "TBD") return val;
          }
        }
      }
      return "";
    };
    const extractedTitle = extractField(outA, "RFP Title", "Title") || title || "Untitled";
    const extractedAgency = extractField(outA, "Agency") || agency || "";
    const extractedValue = extractField(outA, "Estimated Value", "Contract Value", "Value") || "";
    const extractedDeadline = extractField(outA, "Proposal Due Date", "Key Dates", "Deadline") || "";
    const extractedType = extractField(outA, "Service Archetype", "Contract Type") || "";
    const extractedGeo = extractField(outA, "Geography", "Place of Performance") || "";
    const opiMatch = outB ? outB.split("\n").find(l => l.match(/OPI/i) && l.match(/\d+/)) : null;
    const extractedOPI = opiMatch ? parseInt(opiMatch.match(/\d+/)[0]) : opi;
    store.set("tracker", [{
      id: "wf-" + Date.now(),
      title: extractedTitle, agency: extractedAgency, value: extractedValue,
      deadline: extractedDeadline, type: extractedType, geography: extractedGeo,
      stage: decision === "GO" ? "pursuing" : decision === "CONDITIONAL GO" ? "qualifying" : "identified",
      decision, opiScore: extractedOPI,
      decomposition: outA, execBrief: outB,
      addedDate: new Date().toISOString(),
      notes: "Full workflow " + new Date().toLocaleDateString()
    }, ...tracker]);
  };

  const runC = () => {
    saveToTracker();
    saveSharedCtx({ rfpText: rfpText || sharedCtx.rfpText, decomposition: outA, execBrief: outB, title, agency });
    goToProposal("executive_summary");
  };

  const saveNoProposal = () => { saveToTracker(); alert("Saved to Pipeline Tracker!"); };
  const decColor = decision === "GO" ? GREEN : decision === "CONDITIONAL GO" ? GOLD : decision === "NO-BID" ? RED : TEXT_D;
  const hasResult = outA || outB;
  const isStep2Done = !!outB;

  return (
    <div>
      <div style={{marginBottom:20}}>
        <h2 style={{color:GOLD,margin:0,fontSize:20,fontWeight:800}}>Full Workflow</h2>
        <p style={{color:TEXT_D,margin:"4px 0 0",fontSize:12}}>RFP Decomposition → Executive Brief + OPI → Proposal Package</p>
      </div>

      {error && <div style={{marginBottom:16,padding:"10px 14px",background:RED+"15",border:`1px solid ${RED}44`,borderRadius:4,color:RED,fontSize:13}}>{error}</div>}

      {/* Input form — always show if no results yet */}
      {!hasResult && !loadingA && (
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
            <div><Label text="OPPORTUNITY TITLE" /><Input value={title} onChange={setTitle} placeholder="e.g. FEMA PA TPA — Jefferson Parish" /></div>
            <div><Label text="AGENCY" /><Input value={agency} onChange={setAgency} placeholder="e.g. Jefferson Parish OEM" /></div>
            <div><Label text="KNOWN INCUMBENT" /><Input value={incumbent} onChange={setIncumbent} placeholder="e.g. ICF / None / Unknown" /></div>
            <div><Label text="RFP URL (optional)" /><Input value={rfpUrl} onChange={setRfpUrl} placeholder="https://..." /></div>
          </div>
          <div><Label text="RELATIONSHIP INTEL / CONTEXT" /><Textarea value={intel} onChange={setIntel} placeholder="Known relationships, budget intel, political context..." rows={2} /></div>
          <div>
            <Label text="RFP / SOLICITATION TEXT" />
            <div style={{display:"flex",gap:10,alignItems:"center",marginBottom:8}}>
              <label style={{display:"inline-flex",alignItems:"center",gap:8,padding:"7px 14px",background:BG4,
                border:`1px solid ${BORDER}`,borderRadius:4,cursor:"pointer",fontSize:12,color:TEXT_D}}>
                <span>📎 Upload PDF / Word / TXT</span>
                <input type="file" accept=".pdf,.doc,.docx,.txt" onChange={handleFileUpload} style={{display:"none"}} />
              </label>
              {fileLoading && <span style={{color:GOLD,fontSize:12,animation:"pulse 1.2s infinite"}}>Extracting text from file...</span>}
              {fileName && !fileLoading && <span style={{color:GREEN,fontSize:12}}>✓ {fileName}</span>}
            </div>
            <Textarea value={rfpText} onChange={setRfpText} placeholder="Paste RFP text here, or upload a file above..." rows={8} />
          </div>
          <Btn onClick={runA} disabled={!rfpText.trim() && !title.trim()} style={{alignSelf:"flex-start"}}>
            Step 1: Analyze RFP
          </Btn>
        </div>
      )}

      {/* Loading state for Step 1 */}
      {loadingA && (
        <Card style={{border:`1px solid ${GOLD}44`,padding:32,textAlign:"center"}}>
          <div style={{color:GOLD,fontSize:18,fontWeight:700,marginBottom:12,animation:"pulse 1.2s infinite"}}>⟳ Analyzing RFP...</div>
          <div style={{color:TEXT_D,fontSize:13,marginBottom:8}}>Extracting scope, evaluation criteria, compliance, staffing, and risks</div>
          <div style={{color:GOLD,fontSize:28,fontWeight:800,margin:"10px 0"}}>{elapsed}s</div>
          <div style={{color:TEXT_D,fontSize:11}}>Typical: 30–90 seconds for large RFPs</div>
        </Card>
      )}

      {/* Results */}
      {hasResult && !loadingA && (
        <div>
          <Card style={{marginBottom:16}}>
            <div style={{display:"flex",gap:12,alignItems:"center",flexWrap:"wrap"}}>
              {outA && <span style={{color:GREEN,fontSize:13}}>✓ Step 1 Complete</span>}
              {outB && <span style={{color:GREEN,fontSize:13}}>✓ Step 2 Complete</span>}
              {decision && <span style={{color:decColor,fontWeight:700,fontSize:14}}>{decision}</span>}
              {opi !== null && <OPIBadge score={opi} />}
              <Btn small variant="secondary" style={{marginLeft:"auto"}} onClick={()=>{setOutA("");setOutB("");setDecision("");setOpi(null);setRfpText("");setTitle("");setAgency("");setError("");}}>New Workflow</Btn>
            </div>
          </Card>

          {loadingB && (
            <Card style={{border:`1px solid ${GOLD}44`,padding:32,textAlign:"center",marginBottom:16}}>
              <div style={{color:GOLD,fontSize:18,fontWeight:700,marginBottom:12,animation:"pulse 1.2s infinite"}}>⟳ Generating Executive Brief...</div>
              <div style={{color:GOLD,fontSize:28,fontWeight:800,margin:"10px 0"}}>{elapsed}s</div>
              <div style={{color:TEXT_D,fontSize:11}}>Typical: 30–60 seconds</div>
            </Card>
          )}

          <div style={{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap"}}>
            {[["a","Decomposition"],["b","Executive Brief"]].map(([id,label]) => (
              <button key={id} onClick={()=>setTab(id)} style={{
                padding:"6px 14px",borderRadius:4,fontSize:12,cursor:"pointer",fontFamily:"inherit",
                background:tab===id?GOLD:BG3,color:tab===id?"#000":TEXT_D,
                border:`1px solid ${tab===id?GOLD:BORDER}`,fontWeight:tab===id?700:400
              }}>{label}</button>
            ))}
          </div>

          {tab === "a" && (
            <div>
              <AIOut content={outA} label="RFP DECOMPOSITION" />
              {outA && !outB && !loadingB && (
                <div style={{marginTop:12}}>
                  {researchStatus && (
                    <div style={{marginBottom:10,padding:"7px 12px",borderRadius:4,fontSize:12,
                      background:researchStatus.includes("complete")?GREEN+"15":GOLD+"15",
                      border:`1px solid ${researchStatus.includes("complete")?GREEN:GOLD}44`,
                      color:researchStatus.includes("complete")?GREEN:GOLD}}>
                      {researchStatus.includes("complete") ? "✓ " : "⟳ "}{researchStatus}
                    </div>
                  )}
                  <Btn onClick={runB}>Step 2: Executive Brief + OPI</Btn>
                </div>
              )}
            </div>
          )}

          {tab === "b" && (
            <div>
              <AIOut content={outB} label="EXECUTIVE DECISION BRIEF" />
              {outB && !loadingB && (
                <div style={{marginTop:16}}>

// ── PIPELINE SCANNER ──────────────────────────────────────────────────────────
function PipelineScanner() {
  const [opps, setOpps] = useState([]);
  const [scanning, setScanning] = useState(false);
  const [progress, setProgress] = useState("");
  const [analysis, setAnalysis] = useState({});
  const [analyzing, setAnalyzing] = useState({});
  const [lastScanned, setLastScanned] = useState(null);
  const [error, setError] = useState("");

  useEffect(() => {
    const d = store.get("scanner");
    if (d) { setOpps(d.opps || []); setLastScanned(d.at); }
  }, []);

  const QUERIES = [
    {label:"FEMA PA Louisiana", q:"FEMA Public Assistance TPA program management RFP Louisiana 2026"},
    {label:"CDBG-DR Gulf Coast", q:"CDBG-DR disaster recovery program manager RFP Louisiana Gulf Coast 2026"},
    {label:"TPA Claims", q:"third party administrator TPA claims management RFP disaster recovery 2026"},
    {label:"Housing Authority", q:"housing authority program administration RFP Louisiana 2026"},
    {label:"SAM.gov Disaster", q:"SAM.gov NAICS 541611 disaster recovery program management Louisiana Texas 2026"},
    {label:"Recompetes", q:"disaster recovery program management recompete RFP Louisiana Texas 2026"},
  ];

  const scan = async () => {
    setScanning(true); setError(""); setOpps([]);
    const results = [];
    for (let i = 0; i < QUERIES.length; i++) {
      const sq = QUERIES[i];
      setProgress("Searching: " + sq.label + " (" + (i+1) + "/" + QUERIES.length + ")...");
      try {
        const txt = await callClaude(
          "Find real open government RFPs matching: " + sq.q + ". Today: " + new Date().toLocaleDateString() + ". Return ONLY a JSON array. Each object: title, agency, value, deadline (YYYY-MM-DD or TBD), url, description (1 sentence). Only real verifiable opportunities. Return [] if none found.",
          "Return ONLY valid JSON array, no markdown, no explanation."
        );
        const clean = txt.replace(/```json|```/g, "").trim();
        const s = clean.indexOf("["), e = clean.lastIndexOf("]");
        if (s !== -1 && e !== -1) {
          JSON.parse(clean.slice(s, e+1)).forEach(o => {
            o.id = "sc-" + Date.now() + "-" + Math.random().toString(36).slice(2,7);
            o.cat = sq.label;
            results.push(o);
          });
        }
      } catch(ex) {}
      await new Promise(r => setTimeout(r, 300));
    }
    const seen = new Set();
    const deduped = results.filter(o => {
      const k = (o.title || "").toLowerCase().slice(0, 35);
      if (seen.has(k)) return false;
      seen.add(k); return true;
    });
    const at = new Date().toISOString();
    setOpps(deduped); setLastScanned(at);
    store.set("scanner", {opps: deduped, at});
    if (!deduped.length) setError("No results returned. Try again or use manual portal links below.");
    setProgress(""); setScanning(false);
  };

  const analyze = async (opp) => {
    setAnalyzing(a => ({...a, [opp.id]: true}));
    const txt = await callClaude("Analyze for HGI:\nTitle: " + opp.title + "\nAgency: " + opp.agency + "\nValue: " + opp.value + "\nDue: " + opp.deadline + "\n\n1) HGI fit 1-10\n2) Win themes\n3) Key risks\n4) BID/NO-BID\n5) Next action");
    setAnalysis(a => ({...a, [opp.id]: txt}));
    setAnalyzing(a => ({...a, [opp.id]: false}));
  };

  const addTracker = (opp) => {
    const ex = store.get("tracker") || [];
    if (ex.find(o => o.id === opp.id)) { alert("Already in tracker."); return; }
    store.set("tracker", [{
      ...opp, title: opp.title || "Untitled", agency: opp.agency || "",
      value: opp.value || "", deadline: opp.deadline || "", type: opp.cat || "",
      stage: "identified", notes: opp.description || "", addedDate: new Date().toISOString()
    }, ...ex]);
    alert("Added to Pipeline Tracker!");
  };

  return (
    <div>
      <div style={{display:"flex",alignItems:"flex-start",gap:12,marginBottom:20,flexWrap:"wrap"}}>
        <div>
          <h2 style={{color:GOLD,margin:0,fontSize:20,fontWeight:800}}>Live Pipeline Scanner</h2>
          <p style={{color:TEXT_D,margin:"4px 0 0",fontSize:12}}>SAM.gov · LaPAC · Texas SmartBuy · Gulf Coast portals</p>
          {lastScanned && <p style={{color:TEXT_D,fontSize:11,margin:"2px 0 0"}}>Last scan: {new Date(lastScanned).toLocaleString()} · {opps.length} found</p>}
        </div>
        <Btn onClick={scan} disabled={scanning} style={{marginLeft:"auto"}}>{scanning ? "Scanning..." : "Run Live Scan"}</Btn>
      </div>
      {scanning && <Card style={{marginBottom:16,border:`1px solid ${GOLD}44`}}>
        <div style={{color:GOLD,fontWeight:700,marginBottom:6,animation:"pulse 1.2s infinite"}}>Scanning procurement portals...</div>
        <div style={{color:TEXT_D,fontSize:12}}>{progress}</div>
      </Card>}
      {error && <Card style={{marginBottom:16,border:`1px solid ${RED}44`}}><div style={{color:RED,fontSize:13}}>{error}</div></Card>}
      {!scanning && !opps.length && !error && <Card style={{textAlign:"center",padding:48,border:`1px dashed ${BORDER}`}}>
        <div style={{fontSize:40,marginBottom:12}}>◎</div>
        <Btn onClick={scan}>Run First Scan</Btn>
      </Card>}
      <div style={{display:"flex",flexDirection:"column",gap:12}}>
        {opps.map(opp => (
          <Card key={opp.id} style={{borderLeft:`3px solid ${GOLD}`}}>
            <div style={{display:"flex",alignItems:"flex-start",gap:12}}>
              <div style={{flex:1}}>
                <div style={{fontWeight:700,color:TEXT,fontSize:14,marginBottom:4}}>{opp.title}</div>
                {opp.description && <div style={{color:TEXT_D,fontSize:12,marginBottom:6}}>{opp.description}</div>}
                <div style={{display:"flex",gap:16,fontSize:12,flexWrap:"wrap"}}>
                  {opp.agency && <span><span style={{color:GOLD}}>Agency:</span> {opp.agency}</span>}
                  {opp.value && <span><span style={{color:GOLD}}>Value:</span> {opp.value}</span>}
                  {opp.deadline && <span><span style={{color:GOLD}}>Due:</span> {opp.deadline}</span>}
                  {opp.url && <a href={opp.url} target="_blank" rel="noopener noreferrer" style={{color:GOLD}}>View RFP</a>}
                </div>
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:6}}>
                <Btn small onClick={()=>analyze(opp)} disabled={analyzing[opp.id]}>{analyzing[opp.id]?"...":"Analyze"}</Btn>
                <Btn small variant="secondary" onClick={()=>addTracker(opp)}>+ Track</Btn>
              </div>
            </div>
            {(analyzing[opp.id] || analysis[opp.id]) && <div style={{marginTop:12}}><AIOut content={analysis[opp.id]} loading={analyzing[opp.id]} /></div>}
          </Card>
        ))}
      </div>
      <Card style={{marginTop:20,background:BG3}}>
        <div style={{color:GOLD_D,fontSize:11,fontWeight:700,letterSpacing:"0.08em",marginBottom:10}}>MANUAL PORTALS</div>
        <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
          {[["SAM.gov","https://sam.gov/search/?index=opp&keywords=disaster+recovery+program+management"],
            ["LaPAC","https://wwwcfprd.doa.louisiana.gov/lapac/bidSelect.cfm"],
            ["Texas SmartBuy","https://www.txsmartbuy.gov/sp"],
            ["FEMA Procurement","https://www.fema.gov/about/procurement"],
            ["HUD CDBG-DR","https://www.hud.gov/program_offices/comm_planning/cdbg-dr"]
          ].map(([label,url]) => (
            <a key={label} href={url} target="_blank" rel="noopener noreferrer"
              style={{color:GOLD,fontSize:12,textDecoration:"none",padding:"4px 10px",border:`1px solid ${GOLD}44`,borderRadius:4}}>{label}</a>
          ))}
        </div>
      </Card>
    </div>
  );
}

const STAGES = [
  {id:"identified", label:"Identified", color:TEXT_D},

  {id:"won", label:"Won", color:GREEN},

    setForm({title:item.title,agency:item.agency||"",type:item.type||"",value:item.value||"",deadline:item.deadline||"",notes:item.notes||"",stage:item.stage,opiScore:item.opiScore||""});

  return (
    <div>

        <div>
          <h2 style={{color:GOLD,margin:0,fontSize:20,fontWeight:800}}>Pipeline Tracker</h2>

        </div>
        <Btn style={{marginLeft:"auto"}} onClick={()=>{setShowAdd(!showAdd);setEditItem(null);}}>+ Add Opportunity</Btn>
      </div>
      <div style={{display:"flex",gap:6,marginBottom:16,flexWrap:"wrap"}}>
        <button onClick={()=>setFilterStage("all")} style={{padding:"4px 12px",borderRadius:20,fontSize:11,cursor:"pointer",fontFamily:"inherit",border:"none",background:filterStage==="all"?GOLD:BG3,color:filterStage==="all"?"#000":TEXT_D,fontWeight:filterStage==="all"?700:400}}>All ({items.length})</button>
        {STAGES.map(s => {
          const ct = items.filter(i=>i.stage===s.id).length;
          if(!ct) return null;
          return <button key={s.id} onClick={()=>setFilterStage(s.id)} style={{padding:"4px 12px",borderRadius:20,fontSize:11,cursor:"pointer",fontFamily:"inherit",border:`1px solid ${s.color}44`,background:filterStage===s.id?s.color+"33":"transparent",color:filterStage===s.id?s.color:TEXT_D,fontWeight:filterStage===s.id?700:400}}>{s.label} ({ct})</button>;
        })}

      {showAdd && (
        <Card style={{marginBottom:16,border:`1px solid ${GOLD}44`}}>
          <h3 style={{color:GOLD,margin:"0 0 12px",fontSize:14}}>{editItem?"Edit Opportunity":"New Opportunity"}</h3>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>

            <Input value={form.opiScore} onChange={v=>setF("opiScore",v)} placeholder="OPI Score (0-100)" />
            <Sel value={form.stage} onChange={v=>setF("stage",v)} options={STAGES.map(s=>({value:s.id,label:s.label}))} style={{gridColumn:"1/-1"}} />
            <Textarea value={form.notes} onChange={v=>setF("notes",v)} placeholder="Notes, context, next actions..." rows={2} style={{gridColumn:"1/-1"}} />
          </div>
          <div style={{marginTop:12,display:"flex",gap:8}}>
            <Btn onClick={submit}>{editItem?"Save Changes":"Add to Pipeline"}</Btn>
            <Btn variant="secondary" onClick={()=>{setShowAdd(false);setEditItem(null);}}>Cancel</Btn>
          </div>

      {!filtered.length && (

          return (

                  <span style={{color:TEXT_D,fontSize:14}}>{isOpen?"▲":"▼"}</span>
                </div>

                    <div>

// ── PROPOSAL ENGINE ───────────────────────────────────────────────────────────
function ProposalEngine({ sharedCtx={}, defaultSection="executive_summary" }) {
  const [rfpText, setRfpText] = useState("");
  const [section, setSection] = useState(defaultSection);
  const [autoLoaded, setAutoLoaded] = useState(false);
  const [currentlyGenerating, setCurrentlyGenerating] = useState("");
  const [proposalDraft, setProposalDraft] = useState(() => store.get("proposalDraft") || {});
  const [activeView, setActiveView] = useState("generate");
  const [context, setContext] = useState("");
  const [result, setResult] = useState("");
  const [loading, setLoading] = useState(false);

  const saveSection = (sec, text) => {
    const updated = {...proposalDraft, [sec]: text};
    setProposalDraft(updated);
    store.set("proposalDraft", updated);
  };
  const clearDraft = () => { setProposalDraft({}); store.set("proposalDraft", {}); };

  useEffect(() => {
    if (!autoLoaded && sharedCtx.rfpText && !rfpText) {
      setRfpText(sharedCtx.rfpText);
      setContext((sharedCtx.title || "") + (sharedCtx.agency ? " — " + sharedCtx.agency : ""));
      setAutoLoaded(true);
    }
    setSection(defaultSection);
  }, [defaultSection, sharedCtx]);

  const SECTIONS = [
    {value:"executive_summary",label:"Executive Summary"},
    {value:"technical_approach",label:"Technical Approach"},
    {value:"management_approach",label:"Management Approach"},
    {value:"staffing_plan",label:"Staffing Plan"},
    {value:"past_performance",label:"Past Performance Matrix"},
    {value:"transition_plan",label:"Transition / Mobilization Plan"},
    {value:"pricing_narrative",label:"Pricing Narrative"},
    {value:"compliance_matrix",label:"Compliance Matrix"},
    {value:"clarifying_questions",label:"Clarifying Questions"},
    {value:"red_team",label:"Red Team Critique"},
  ];

  const generate = async () => {
    setLoading(true);
    const sLabel = SECTIONS.find(s => s.value === section)?.label || section;
    setCurrentlyGenerating(sLabel);
    const activeRfp = rfpText || sharedCtx.rfpText || "";
    const decomp = sharedCtx.decomposition ? "\n\nRFP DECOMPOSITION:\n" + sharedCtx.decomposition.slice(0, 1200) : "";
    const research = sharedCtx.research ? "\n\nCOMPETITIVE RESEARCH:\n" + sharedCtx.research.slice(0, 800) : "";
    const brief = sharedCtx.execBrief ? "\n\nEXECUTIVE BRIEF SUMMARY:\n" + sharedCtx.execBrief.slice(0, 800) : "";
    const sys = "You are a proposal writer for HGI. Write a complete, submission-ready " + sLabel + " section. Be specific, detailed, and evaluator-aligned. Use HGI past performance heavily. Use [TBD:...] for unknowns. Write at least 600 words for this section. " + HGI_CONTEXT;
    const txt = await callClaude(
      "Write a complete, detailed " + sLabel + " section for HGI proposal.\nRFP Context: " + (activeRfp||"General disaster recovery TPA services") + "\nAdditional Context: " + context + decomp + brief + research + "\n\nWrite the full section. Be thorough. At least 600 words.",
      sys, 4000
    );
    setResult(txt);
    saveSection(section, txt);
    setCurrentlyGenerating("");
    setLoading(false);
  };

  const completedSections = Object.keys(proposalDraft).length;
  const [viewingSection, setViewingSection] = useState(null);

  const removeSection = (val) => {
    const nd = {...proposalDraft};
    delete nd[val];
    setProposalDraft(nd);
    store.set("proposalDraft", nd);
  };
  const goGenerate = (val) => { setSection(val); setActiveView("generate"); setViewingSection(null); };

  const saveToTrackerFromProposal = () => {
    const wfState = store.get("wfState") || {};
    const tracker = store.get("tracker") || [];
    const existing = tracker.find(o => o.id === "wf-proposal-draft");
    const entry = {
      id: existing ? existing.id : "wf-" + Date.now(),
      title: sharedCtx.title || wfState.title || "Untitled Opportunity",
      agency: sharedCtx.agency || wfState.agency || "",
      stage: "proposal",
      decomposition: sharedCtx.decomposition || wfState.outA || "",
      execBrief: sharedCtx.execBrief || wfState.outB || "",
      proposal: Object.entries(proposalDraft).map(([k,v]) => "=== " + k.toUpperCase().replace(/_/g," ") + " ===\n" + v).join("\n\n"),
      decision: wfState.decision || "",
      opiScore: wfState.opi || "",
      addedDate: existing ? existing.addedDate : new Date().toISOString(),
      notes: completedSections + " proposal sections drafted · " + new Date().toLocaleDateString()
    };
    const updated = existing ? tracker.map(o => o.id === existing.id ? entry : o) : [entry, ...tracker];
    store.set("tracker", updated);
    alert("✓ Saved to Pipeline Tracker with " + completedSections + " proposal sections!");
  };

  return (
    <div>
      <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:4,flexWrap:"wrap"}}>
        <h2 style={{color:GOLD,margin:0,fontSize:20,fontWeight:800}}>Proposal Engine</h2>
        {completedSections > 0 && <Badge color={GREEN}>{completedSections} section{completedSections>1?"s":""} drafted</Badge>}
        {completedSections > 0 && <Btn small variant="ghost" onClick={()=>{setActiveView(activeView==="generate"?"workspace":"generate");setViewingSection(null);}}>
          {activeView==="generate"?"View Full Draft →":"← Back to Generator"}
        </Btn>}
        {completedSections > 0 && <Btn small onClick={saveToTrackerFromProposal}>💾 Save to Tracker</Btn>}
        {completedSections > 0 && <Btn small variant="danger" onClick={clearDraft}>Clear Draft</Btn>}
      </div>
      <p style={{color:TEXT_D,margin:"0 0 12px",fontSize:12}}>Generate sections one at a time — each saves automatically</p>

      {sharedCtx.rfpText ? (
        <div style={{marginBottom:12,padding:"8px 12px",background:GREEN+"15",border:`1px solid ${GREEN}44`,borderRadius:4,fontSize:12,color:GREEN}}>
          ✓ RFP loaded: <strong>{sharedCtx.title || "Untitled"}</strong>{sharedCtx.agency ? " — " + sharedCtx.agency : ""}
        </div>
      ) : (
        <div style={{marginBottom:16,padding:"12px 16px",background:ORANGE+"15",border:`1px solid ${ORANGE}44`,borderRadius:4}}>
          <div style={{color:ORANGE,fontWeight:700,fontSize:13,marginBottom:4}}>⚠ Recommended: Complete Full Workflow First</div>
          <div style={{color:TEXT_D,fontSize:12}}>For best results run Full Workflow first, then come here to expand sections.</div>
        </div>
      )}

      {activeView === "generate" && (
        <div>
          <Card style={{marginBottom:16}}>
            <div style={{display:"flex",flexDirection:"column",gap:12}}>
              <div>
                <Label text="RFP CONTEXT (optional — paste if not loaded from workflow)" />
                <Textarea value={rfpText} onChange={setRfpText} placeholder="Paste RFP text or upload above..." rows={4} />
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
                <div><Label text="SECTION TO GENERATE" /><Sel value={section} onChange={setSection} options={SECTIONS} style={{width:"100%"}} /></div>
                <div><Label text="ADDITIONAL CONTEXT" /><Input value={context} onChange={setContext} placeholder="Agency, value, key win themes..." /></div>
              </div>
              <Btn onClick={generate} disabled={loading} style={{alignSelf:"flex-start"}}>
                {loading ? "Writing " + currentlyGenerating + "..." : "Generate: " + (SECTIONS.find(s=>s.value===section)?.label||"Section")}
              </Btn>
            </div>
          </Card>
          <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:16}}>
            {SECTIONS.map(s => (
              <button key={s.value} onClick={()=>{setSection(s.value);if(proposalDraft[s.value])setViewingSection(s.value===viewingSection?null:s.value);}} style={{
                padding:"5px 10px",borderRadius:4,fontSize:11,cursor:"pointer",fontFamily:"inherit",
                background:section===s.value?GOLD:proposalDraft[s.value]?GREEN+"22":BG3,
                color:section===s.value?"#000":proposalDraft[s.value]?GREEN:TEXT_D,
                border:`1px solid ${section===s.value?GOLD:proposalDraft[s.value]?GREEN:BORDER}`,
                fontWeight:section===s.value||proposalDraft[s.value]?700:400
              }}>
                {proposalDraft[s.value]?"✓ ":""}{s.label}
              </button>
            ))}
          </div>

          {viewingSection && proposalDraft[viewingSection] && (
            <div style={{marginBottom:16}}>
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
                <span style={{color:GREEN,fontWeight:700,fontSize:13}}>✓ {SECTIONS.find(s=>s.value===viewingSection)?.label}</span>
                <Btn small variant="ghost" onClick={()=>setViewingSection(null)}>Hide</Btn>
                <Btn small variant="secondary" onClick={()=>{setViewingSection(null);generate();}}>Regenerate</Btn>
              </div>
              <Textarea value={proposalDraft[viewingSection]} onChange={v=>{const nd={...proposalDraft,[viewingSection]:v};setProposalDraft(nd);store.set("proposalDraft",nd);}} rows={16} />
            </div>
          )}

          {!viewingSection && (loading || result) && <AIOut content={result} loading={loading} label={"GENERATING: " + currentlyGenerating.toUpperCase()} />}
        </div>
      )}

      {activeView === "workspace" && (
        <div>
          <Card style={{marginBottom:16,border:`1px solid ${GOLD}44`}}>
            <div style={{color:GOLD,fontWeight:700,fontSize:13,marginBottom:4}}>PROPOSAL DRAFT WORKSPACE</div>
            <div style={{color:TEXT_D,fontSize:12}}>All generated sections saved here. Click any section to edit.</div>
          </Card>
          {SECTIONS.map(s => (
            proposalDraft[s.value] ? (

  );

// ── FINANCIAL ANALYSIS & PRICING ─────────────────────────────────────────────
function FinancialPricing({ sharedCtx={} }) {
  const LABOR_CATS = ["Program Manager","Deputy PM","Senior Analyst","Analyst","Associate Analyst","Data Specialist","Field Inspector","Administrative Support","IT Specialist","Financial Analyst"];
  const [activeTab, setActiveTab] = useState("buildup");
  const [laborRows, setLaborRows] = useState(() => store.get("laborRows") || [
    {id:1, cat:"Program Manager", hours:2080, rawRate:95, fringe:0.28, overhead:0.15, ga:0.12, fee:0.10},
    {id:2, cat:"Senior Analyst", hours:2080, rawRate:65, fringe:0.28, overhead:0.15, ga:0.12, fee:0.10},
  ]);
  const [odcs, setOdcs] = useState(() => store.get("odcs") || [{id:1,desc:"Travel",amount:25000},{id:2,desc:"Other Direct Costs",amount:10000}]);
  const [periods, setPeriods] = useState(() => store.get("pricePeriods") || [{id:1,label:"Base Year",months:12,escalation:0},{id:2,label:"Option Year 1",months:12,escalation:3},{id:3,label:"Option Year 2",months:12,escalation:3}]);
  const [ptw, setPtw] = useState(() => store.get("ptw") || {low:"",mid:"",high:"",strategy:"value"});
  const [costNarrative, setCostNarrative] = useState("");
  const [narrativeLoading, setNarrativeLoading] = useState(false);
  const [scenario, setScenario] = useState({feeAdj:0, laborAdj:0, hoursAdj:0});

  const saveLR = (rows) => { setLaborRows(rows); store.set("laborRows", rows); };
  const saveODC = (rows) => { setOdcs(rows); store.set("odcs", rows); };
  const savePeriods = (rows) => { setPeriods(rows); store.set("pricePeriods", rows); };
  const savePTW = (p) => { setPtw(p); store.set("ptw", p); };

  const calcRow = (r, feeAdj=0, laborAdj=0, hoursAdj=0) => {
    const raw = parseFloat(r.rawRate||0) * (1 + laborAdj/100);
    const fringe = raw * parseFloat(r.fringe||0);
    const overhead = (raw + fringe) * parseFloat(r.overhead||0);
    const ga = (raw + fringe + overhead) * parseFloat(r.ga||0);
    const cost = raw + fringe + overhead + ga;
    const feeRate = parseFloat(r.fee||0) + feeAdj/100;
    const loaded = cost * (1 + feeRate);
    const hours = parseFloat(r.hours||0) * (1 + hoursAdj/100);
    return { raw, fringe, overhead, ga, cost, loaded, hours, total: loaded * hours };
  };

  const totalLabor = (feeAdj=0, laborAdj=0, hoursAdj=0) =>
    laborRows.reduce((sum, r) => sum + calcRow(r, feeAdj, laborAdj, hoursAdj).total, 0);
  const totalODC = () => odcs.reduce((sum, o) => sum + parseFloat(o.amount||0), 0);
  const fmt = (n) => "$" + Math.round(n).toLocaleString();
  const periodTotal = (p, idx) => {
    const esc = Math.pow(1 + (parseFloat(p.escalation||0)/100), idx);
    return (totalLabor() * esc + totalODC()) * (parseFloat(p.months||12)/12);
  };
  const contractTotal = () => periods.reduce((sum, p, i) => sum + periodTotal(p, i), 0);
  const profitMargin = () => {
    const t = totalLabor();
    const cost = laborRows.reduce((sum, r) => sum + calcRow(r).cost * calcRow(r).hours, 0);
    return t > 0 ? ((t - cost) / t * 100).toFixed(1) : 0;
  };

  const generateNarrative = async () => {
    setNarrativeLoading(true);
    const txt = await callClaude("Write a professional Cost Proposal Narrative for HGI.\nTotal Contract Value: " + fmt(contractTotal()) + "\nBase Year: " + fmt(periodTotal(periods[0],0)) + "\nLabor: " + laborRows.map(r => r.cat + " — " + fmt(calcRow(r).total)).join(", ") + "\nODCs: " + fmt(totalODC()) + "\nProfit Margin: " + profitMargin() + "%\n\nWrite a complete cost narrative: pricing methodology, labor rate justification, ODC explanation, cost realism. Professional government proposal tone.", "You are a cost proposal specialist for HGI.", 2000);
    setCostNarrative(txt);
    setNarrativeLoading(false);
  };

              <div style={{color:GOLD_D,fontSize:10,letterSpacing:"0.15em",marginTop:2}}>AI CAPTURE SYSTEM v1.1</div>
              <div style={{color:TEXT_D,fontSize:11,marginTop:4}}>Hammerman & Gainer LLC · 95 Years</div>
              {t1 > 0 && <div style={{marginTop:8}}><Badge color={GREEN}>{t1} Tier 1 Opp{t1>1?"s":""}</Badge></div>}
            </div>
          ) : (
            <div style={{color:GOLD,fontWeight:800,fontSize:16,textAlign:"center"}}>H</div>
          )}
        </div>
        <nav style={{flex:1,overflowY:"auto",padding:"12px 8px"}}>
          {MODULES.map(m => {
            const isActive = active === m.id;
            return (
              <button key={m.id} onClick={()=>setActive(m.id)}
                style={{width:"100%",display:"flex",alignItems:"center",gap:10,padding:"10px 10px",borderRadius:4,
                  cursor:"pointer",border:"none",fontFamily:"inherit",marginBottom:2,
                  background:isActive?GOLD+"22":"transparent",
                  borderLeft:isActive?`3px solid ${GOLD}`:"3px solid transparent",
                  color:isActive?GOLD:TEXT_D,fontSize:13,textAlign:"left"}}>
                <span style={{fontSize:16,flexShrink:0}}>{m.icon}</span>
                {sideOpen && <span style={{fontWeight:isActive?700:400,flex:1}}>{m.label}</span>}
                {sideOpen && m.badge && <Badge color={GREEN}>{m.badge}</Badge>}
              </button>
            );
          })}
        </nav>
        {sideOpen && (
          <div style={{padding:"12px 16px",borderTop:`1px solid ${BORDER}`,fontSize:10,color:TEXT_D}}>
            <div style={{fontWeight:700,color:GOLD_D,marginBottom:6,letterSpacing:"0.08em"}}>KEY PAST PERFORMANCE</div>
            {["Road Home $12B CDBG-DR","BP GCCF 1M+ claims","PBGC 34M beneficiaries","TPCIGA 20yrs Texas","Restore Louisiana","Terrebonne Parish / Ida"].map(p => (
              <div key={p} style={{marginBottom:3}}>· {p}</div>
            ))}
          </div>
        )}
      </div>
      <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
        <div style={{padding:"14px 20px",borderBottom:`1px solid ${BORDER}`,display:"flex",alignItems:"center",gap:12,background:BG2}}>
          <button onClick={()=>setSideOpen(s=>!s)} style={{background:"none",border:"none",color:TEXT_D,cursor:"pointer",fontSize:16,padding:4}}>☰</button>
          <span style={{color:GOLD,fontWeight:700,fontSize:14}}>{MODULES.find(m=>m.id===active)?.label}</span>
        </div>
        <div style={{flex:1,overflowY:"auto",padding:24}}>
          {components[active]}
        </div>
      </div>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById("root"));
</script>
</body>
</html>
